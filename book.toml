[book]
title = "Bloqr"
authors = ["jaypatrick"]
src = "docs"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.last-updated]
command = "deno run --allow-read --allow-run --allow-write scripts/mdbook-last-updated.ts"
after = ["mermaid"]

[output.html]
site-url = "/"
git-repository-url = "https://github.com/jaypatrick/adblock-compiler"
edit-url-template = "https://github.com/jaypatrick/adblock-compiler/edit/main/{path}"
input-404 = "404.md"
additional-css = ["theme/custom.css"]
additional-js = ["theme/build-info.js", "theme/mermaid.min.js", "theme/mermaid-init.js", "theme/custom.js"]
