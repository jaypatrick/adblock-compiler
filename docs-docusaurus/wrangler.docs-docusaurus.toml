# wrangler.docs-docusaurus.toml — Docusaurus documentation site (Cloudflare Pages)
# Serves the Docusaurus v3 static build as a Cloudflare Pages site.
# Parallel to the existing mdBook site at docs.bloqr.dev.

name = "bloqr-docs-docusaurus"
compatibility_date = "2026-01-01"

[[routes]]
pattern = "docs-v2.bloqr.dev"
custom_domain = true

[assets]
directory = "./build"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
