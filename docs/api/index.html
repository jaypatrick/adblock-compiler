    <script>
        const spec = {
  "openapi": "3.0.3",
  "info": {
    "title": "Adblock Compiler API",
    "description": "**Compiler-as-a-Service** for adblock filter lists. Transform, optimize, and combine filter lists from multiple sources with real-time progress tracking.\n\n## Features\n- 🎯 Multi-Source Compilation\n- ⚡ Performance (Gzip compression, caching, request deduplication)\n- 🔄 Circuit Breaker with retry logic\n- 📊 Visual Diff between compilations\n- 📡 Real-time progress via SSE and WebSocket\n- 🎪 Batch Processing\n- 🌍 Universal (Deno, Node.js, Cloudflare Workers, browsers)\n\n## Links\n- [GitHub Repository](https://github.com/jaypatrick/adblock-compiler)\n- [Documentation](https://github.com/jaypatrick/adblock-compiler/tree/master/docs)\n- [Web UI](https://adblock-compiler.jayson-knight.workers.dev/)\n",
    "version": "2.0.0",
    "license": {
      "name": "GPL-3.0",
      "url": "https://github.com/jaypatrick/adblock-compiler/blob/master/LICENSE"
    },
    "contact": {
      "name": "Jayson Knight",
      "url": "https://github.com/jaypatrick/adblock-compiler"
    }
  },
  "servers": [
    {
      "url": "https://adblock-compiler.jayson-knight.workers.dev",
      "description": "Production server"
    },
    {
      "url": "http://localhost:8787",
      "description": "Local development server"
    }
  ],
  "tags": [
    {
      "name": "Compilation",
      "description": "Filter list compilation endpoints"
    },
    {
      "name": "Streaming",
      "description": "Real-time event streaming endpoints"
    },
    {
      "name": "Queue",
      "description": "Async job queue management"
    },
    {
      "name": "Metrics",
      "description": "Performance metrics and statistics"
    },
    {
      "name": "WebSocket",
      "description": "Bidirectional real-time communication"
    },
    {
      "name": "Admin",
      "description": "Administration endpoints for storage, auth, migration, and backends (require X-Admin-Key header)"
    },
    {
      "name": "Workflow",
      "description": "Durable execution workflow endpoints"
    },
    {
      "name": "Health",
      "description": "Health monitoring endpoints"
    },
    {
      "name": "Browser Rendering",
      "description": "Endpoints backed by the Cloudflare Browser Rendering binding (`BROWSER`). Used for resolving redirect chains and monitoring filter-list source URLs for changes."
    },
    {
      "name": "Authentication",
      "description": "User-level authentication endpoints — API key management and webhook receivers. Requires Clerk JWT or API key auth."
    },
    {
      "name": "LocalAuth",
      "description": "Local JWT auth bridge — self-contained sign-up/login until Clerk is production-ready. When `CLERK_JWKS_URL` is set the provider auto-switches to Clerk and these endpoints are no longer used."
    },
    {
      "name": "Info",
      "description": "API metadata and self-describing schema endpoints (anonymous access, cached)."
    },
    {
      "name": "Configuration",
      "description": "Compilation configuration defaults, validation, and resolution endpoints."
    }
  ],
  "paths": {
    "/api": {
      "get": {
        "tags": [
          "Metrics"
        ],
        "summary": "Get API information",
        "description": "Returns API version, available endpoints, and usage examples",
        "operationId": "getApiInfo",
        "responses": {
          "200": {
            "description": "API information",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiInfo"
                }
              }
            }
          }
        }
      }
    },
    "/api/schemas": {
      "get": {
        "tags": [
          "Info"
        ],
        "operationId": "getApiSchemas",
        "summary": "Get JSON Schemas for all public request/response types",
        "description": "Returns JSON Schema representations of all public Zod schemas\n(ConfigurationSchema, CompileRequestSchema, SourceSchema, BenchmarkMetricsSchema)\nfor use by API testers and external tooling.\nAnonymous access. Cached for 1 hour.\n",
        "responses": {
          "200": {
            "description": "JSON Schema definitions.",
            "headers": {
              "Cache-Control": {
                "schema": {
                  "type": "string",
                  "example": "public, max-age=3600"
                }
              }
            },
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean",
                      "example": true
                    },
                    "schemas": {
                      "type": "object",
                      "additionalProperties": {
                        "type": "object",
                        "description": "A JSON Schema definition object."
                      }
                    }
                  }
                }
              }
            }
          },
          "429": {
            "$ref": "#/components/responses/RateLimited"
          }
        }
      }
    },
    "/compile": {
      "post": {
        "tags": [
          "Compilation"
        ],
        "summary": "Compile filter list (JSON)",
        "description": "Compile filter lists and return results as JSON. Results are cached for 1 hour.\nSupports request deduplication for concurrent identical requests.\n",
        "operationId": "compileJson",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CompileRequest"
              },
              "examples": {
                "simple": {
                  "summary": "Simple compilation",
                  "value": {
                    "configuration": {
                      "name": "My Filter List",
                      "sources": [
                        {
                          "source": "https://example.com/filters.txt",
                          "transformations": [
                            "RemoveComments",
                            "Validate"
                          ]
                        }
                      ],
                      "transformations": [
                        "Deduplicate"
                      ]
                    }
                  }
                },
                "withPreFetched": {
                  "summary": "With pre-fetched content",
                  "value": {
                    "configuration": {
                      "name": "Custom Rules",
                      "sources": [
                        {
                          "source": "my-custom-rules"
                        }
                      ]
                    },
                    "preFetchedContent": {
                      "my-custom-rules": "||ads.example.com^\n||tracking.example.com^"
                    }
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Compilation successful",
            "headers": {
              "X-Cache": {
                "schema": {
                  "type": "string",
                  "enum": [
                    "HIT",
                    "MISS"
                  ]
                },
                "description": "Cache hit/miss status"
              },
              "X-Request-Deduplication": {
                "schema": {
                  "type": "string",
                  "enum": [
                    "HIT"
                  ]
                },
                "description": "Present if request was deduplicated"
              }
            },
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CompileResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequestError"
          },
          "429": {
            "$ref": "#/components/responses/RateLimitError"
          },
          "500": {
            "$ref": "#/components/responses/CompilationError"
          }
        }
      }
    },
    "/compile/stream": {
      "post": {
        "tags": [
          "Streaming"
        ],
        "summary": "Compile with real-time progress (SSE)",
        "description": "Compile filter lists with real-time progress updates via Server-Sent Events.\nStreams events including source downloads, transformations, diagnostics, cache operations, network events, and metrics.\n",
        "operationId": "compileStream",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CompileRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Event stream",
            "content": {
              "text/event-stream": {
                "schema": {
                  "type": "string",
                  "description": "Server-Sent Events stream with the following event types:\n\n**Compilation Events:**\n- `log` - Log messages (info, warn, error, debug)\n- `source:start` - Source download started\n- `source:complete` - Source download completed\n- `source:error` - Source download failed\n- `transformation:start` - Transformation started\n- `transformation:complete` - Transformation completed\n- `progress` - Compilation progress update\n- `result` - Final compilation result\n- `done` - Compilation finished\n- `error` - Compilation error\n\n**Enhanced Events:**\n- `diagnostic` - Diagnostic event from tracing system\n- `cache` - Cache operation (hit/miss/write)\n- `network` - Network operation (HTTP requests)\n- `metric` - Performance metric\n"
                },
                "examples": {
                  "logEvent": {
                    "value": "event: log\ndata: {\"level\":\"info\",\"message\":\"Fetching source...\"}\n"
                  },
                  "sourceStart": {
                    "value": "event: source:start\ndata: {\"source\":{\"name\":\"Source 1\",\"source\":\"https://...\"},\"sourceIndex\":0,\"totalSources\":2}\n"
                  },
                  "diagnostic": {
                    "value": "event: diagnostic\ndata: {\"eventId\":\"evt-123\",\"timestamp\":\"2026-01-14T05:00:00Z\",\"category\":\"compilation\",\"severity\":\"info\",\"message\":\"Started compilation\"}\n"
                  },
                  "cache": {
                    "value": "event: cache\ndata: {\"operation\":\"hit\",\"key\":\"cache:abc123\",\"size\":1024}\n"
                  },
                  "network": {
                    "value": "event: network\ndata: {\"method\":\"GET\",\"url\":\"https://example.com/filters.txt\",\"statusCode\":200,\"durationMs\":234,\"responseSize\":51200}\n"
                  },
                  "metric": {
                    "value": "event: metric\ndata: {\"metric\":\"download_speed\",\"value\":218.5,\"unit\":\"KB/s\"}\n"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequestError"
          },
          "429": {
            "$ref": "#/components/responses/RateLimitError"
          }
        }
      }
    },
    "/compile/batch": {
      "post": {
        "tags": [
          "Compilation"
        ],
        "summary": "Batch compile multiple lists",
        "description": "Compile multiple filter lists in parallel (max 10 per batch)",
        "operationId": "compileBatch",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/BatchCompileRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Batch compilation results",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/BatchCompileResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequestError"
          },
          "429": {
            "$ref": "#/components/responses/RateLimitError"
          }
        }
      }
    },
    "/compile/async": {
      "post": {
        "tags": [
          "Queue"
        ],
        "summary": "Queue async compilation job",
        "description": "Queue a compilation job for asynchronous processing. Returns immediately with a request ID.\nUse GET /queue/results/{requestId} to retrieve results when complete.\n",
        "operationId": "compileAsync",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CompileRequest"
              }
            }
          }
        },
        "responses": {
          "202": {
            "description": "Job queued successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/QueueResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequestError"
          },
          "500": {
            "$ref": "#/components/responses/ServiceUnavailable"
          }
        }
      }
    },
    "/compile/batch/async": {
      "post": {
        "tags": [
          "Queue"
        ],
        "summary": "Queue batch async compilation",
        "description": "Queue multiple compilations for async processing",
        "operationId": "compileBatchAsync",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/BatchCompileRequest"
              }
            }
          }
        },
        "responses": {
          "202": {
            "description": "Batch queued successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/QueueResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequestError"
          },
          "500": {
            "$ref": "#/components/responses/ServiceUnavailable"
          }
        }
      }
    },
    "/ws/compile": {
      "get": {
        "tags": [
          "WebSocket"
        ],
        "summary": "WebSocket endpoint for real-time compilation",
        "description": "Bidirectional WebSocket connection for real-time compilation with event streaming.\n\n**Client → Server Messages:**\n- `compile` - Start compilation\n- `cancel` - Cancel running compilation\n- `ping` - Heartbeat ping\n\n**Server → Client Messages:**\n- `welcome` - Connection established\n- `pong` - Heartbeat response\n- `compile:started` - Compilation started\n- `event` - Compilation event (source, transformation, progress, diagnostic, cache, network, metric)\n- `compile:complete` - Compilation finished successfully\n- `compile:error` - Compilation failed\n- `compile:cancelled` - Compilation cancelled\n- `error` - Error message\n\n**Features:**\n- Up to 3 concurrent compilations per connection\n- Automatic heartbeat (30s interval)\n- Connection timeout (5 minutes idle)\n- Session-based compilation tracking\n- Cancellation support\n",
        "operationId": "websocketCompile",
        "responses": {
          "101": {
            "description": "WebSocket connection established"
          },
          "426": {
            "description": "Upgrade required (not a WebSocket request)"
          }
        },
        "x-websocket-messages": {
          "client-to-server": [
            {
              "$ref": "#/components/schemas/WsCompileRequest"
            },
            {
              "$ref": "#/components/schemas/WsCancelRequest"
            },
            {
              "$ref": "#/components/schemas/WsPingMessage"
            }
          ],
          "server-to-client": [
            {
              "$ref": "#/components/schemas/WsWelcomeMessage"
            },
            {
              "$ref": "#/components/schemas/WsPongMessage"
            },
            {
              "$ref": "#/components/schemas/WsCompileStartedMessage"
            },
            {
              "$ref": "#/components/schemas/WsEventMessage"
            },
            {
              "$ref": "#/components/schemas/WsCompileCompleteMessage"
            },
            {
              "$ref": "#/components/schemas/WsCompileErrorMessage"
            }
          ]
        }
      }
    },
    "/metrics": {
      "get": {
        "tags": [
          "Metrics"
        ],
        "summary": "Get performance metrics",
        "description": "Returns aggregated metrics for the last 30 minutes",
        "operationId": "getMetrics",
        "responses": {
          "200": {
            "description": "Performance metrics",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/MetricsResponse"
                }
              }
            }
          }
        }
      }
    },
    "/queue/stats": {
      "get": {
        "tags": [
          "Queue"
        ],
        "summary": "Get queue statistics",
        "description": "Returns queue health metrics and job statistics",
        "operationId": "getQueueStats",
        "responses": {
          "200": {
            "description": "Queue statistics",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/QueueStats"
                }
              }
            }
          }
        }
      }
    },
    "/queue/results/{requestId}": {
      "get": {
        "tags": [
          "Queue"
        ],
        "summary": "Get async job results",
        "description": "Retrieve results for a completed async compilation job",
        "operationId": "getQueueResults",
        "parameters": [
          {
            "name": "requestId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "description": "Request ID returned from async endpoints"
          }
        ],
        "responses": {
          "200": {
            "description": "Job results",
            "content": {
              "application/json": {
                "schema": {
                  "oneOf": [
                    {
                      "$ref": "#/components/schemas/CompileResponse"
                    },
                    {
                      "$ref": "#/components/schemas/QueueJobStatus"
                    }
                  ]
                }
              }
            }
          },
          "404": {
            "description": "Job not found"
          }
        }
      }
    },
    "/api/version": {
      "get": {
        "tags": [
          "Metrics"
        ],
        "summary": "Get latest deployment version",
        "description": "Returns the current version from deployment history",
        "operationId": "getApiVersion",
        "responses": {
          "200": {
            "description": "Version information",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/VersionResponse"
                }
              }
            }
          },
          "503": {
            "$ref": "#/components/responses/ServiceUnavailable"
          }
        }
      }
    },
    "/api/deployments": {
      "get": {
        "tags": [
          "Metrics"
        ],
        "summary": "Get deployment history",
        "description": "Returns deployment history records",
        "operationId": "getDeployments",
        "parameters": [
          {
            "name": "limit",
            "in": "query",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 50,
              "minimum": 1,
              "maximum": 1000
            },
            "description": "Maximum number of records to return"
          },
          {
            "name": "version",
            "in": "query",
            "schema": {
              "type": "string"
            },
            "description": "Filter by version"
          },
          {
            "name": "status",
            "in": "query",
            "schema": {
              "type": "string"
            },
            "description": "Filter by deployment status"
          },
          {
            "name": "branch",
            "in": "query",
            "schema": {
              "type": "string"
            },
            "description": "Filter by branch name"
          }
        ],
        "responses": {
          "200": {
            "description": "Deployment history",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/DeploymentHistoryResponse"
                }
              }
            }
          },
          "503": {
            "$ref": "#/components/responses/ServiceUnavailable"
          }
        }
      }
    },
    "/api/deployments/stats": {
      "get": {
        "tags": [
          "Metrics"
        ],
        "summary": "Get deployment statistics",
        "description": "Returns aggregated deployment statistics",
        "operationId": "getDeploymentStats",
        "responses": {
          "200": {
            "description": "Deployment statistics",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/DeploymentStatsResponse"
                }
              }
            }
          },
          "503": {
            "$ref": "#/components/responses/ServiceUnavailable"
          }
        }
      }
    },
    "/api/turnstile-config": {
      "get": {
        "tags": [
          "Metrics"
        ],
        "summary": "Get Turnstile configuration",
        "description": "Returns the Cloudflare Turnstile site key and whether it is enabled",
        "operationId": "getTurnstileConfig",
        "responses": {
          "200": {
            "description": "Turnstile configuration",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/TurnstileConfigResponse"
                }
              }
            }
          }
        }
      }
    },
    "/queue/history": {
      "get": {
        "tags": [
          "Queue"
        ],
        "summary": "Get queue job history",
        "description": "Returns job history and queue depth over time",
        "operationId": "getQueueHistory",
        "responses": {
          "200": {
            "description": "Queue history",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/QueueHistoryResponse"
                }
              }
            }
          }
        }
      }
    },
    "/queue/cancel/{requestId}": {
      "delete": {
        "tags": [
          "Queue"
        ],
        "summary": "Cancel a pending queue job",
        "description": "Cancels a pending queue job by its requestId.\nReturns 409 if the job is already completed, failed, or cancelled.\nRequires authentication (free tier or above).\n",
        "operationId": "cancelQueueJob",
        "security": [
          {
            "BearerAuth": []
          },
          {
            "ApiKeyAuth": []
          }
        ],
        "parameters": [
          {
            "name": "requestId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "pattern": "^[a-zA-Z0-9_-]+$"
            },
            "description": "The requestId of the queue job to cancel."
          }
        ],
        "responses": {
          "200": {
            "description": "Job cancelled successfully.",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean",
                      "example": true
                    },
                    "cancelled": {
                      "type": "boolean",
                      "example": true,
                      "description": "Whether the cancellation signal was recorded. This is a best-effort operation."
                    },
                    "requestId": {
                      "type": "string",
                      "description": "The requestId of the job."
                    }
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "description": "Cloudflare Access JWT invalid or missing.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          },
          "429": {
            "$ref": "#/components/responses/RateLimited"
          }
        }
      }
    },
    "/ast/parse": {
      "post": {
        "tags": [
          "Compilation"
        ],
        "summary": "Parse filter rules into AST",
        "description": "Parses adblock filter rules into an Abstract Syntax Tree representation",
        "operationId": "parseAST",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ASTParseRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Parsed AST",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ASTParseResponse"
                }
              }
            }
          },
          "400": {
            "description": "Invalid request (must provide rules or text)"
          },
          "500": {
            "description": "Parse error"
          }
        }
      }
    },
    "/configuration/defaults": {
      "get": {
        "tags": [
          "Configuration"
        ],
        "operationId": "getConfigurationDefaults",
        "summary": "Get system compilation defaults and limits",
        "description": "Returns the system defaults and hard limits that apply to every compilation.\nNo authentication required (anonymous tier).\n",
        "responses": {
          "200": {
            "description": "Defaults and limits.",
            "headers": {
              "Cache-Control": {
                "schema": {
                  "type": "string",
                  "example": "public, max-age=3600"
                }
              }
            },
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean",
                      "example": true
                    },
                    "defaults": {
