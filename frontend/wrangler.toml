# ============================================================================
# frontend/wrangler.toml — Angular SSR Worker configuration
# ============================================================================
#
# Build output layout (produced by `npm run build` / `ng build`):
#   dist/adblock-compiler/
#   ├── browser/          ← Static assets (JS bundles, CSS, fonts, pre-rendered HTML)
#   └── server/
#       └── server.mjs    ← Workers entry point (compiled from server.ts)
#
# THREE ENVIRONMENTS:
#
#   Local dev  →  `npm run start`  (Angular dev server with HMR, port 4200)
#                 OR `npm run preview`  (wrangler dev, mirrors production Worker)
#                 No .dev.vars needed — this worker owns no secrets.
#                 Angular DevTools works here (development build by default).
#
#   Dev        →  `npm run build:dev && npm run deploy:dev`
#                 Builds with `ng build --configuration development`:
#                   • sourceMap: true  — Angular DevTools extension works
#                   • optimization: false — readable code, no tree-shaking
#                 Deploys to *.workers.dev subdomain via `wrangler deploy --env dev`.
#                 ENVIRONMENT = "development".
#
#   Production →  `npm run build && npm run deploy`
#                 Builds with `ng build` (production config — optimised, minified).
#                 Deploys to app.bloqr.dev via the [[routes]] block.
#                 ENVIRONMENT = "production".
#
# API Worker dependency:
#   The Angular app fetches runtime config at boot from the co-deployed API Worker:
#     GET /api/sentry-config  → returns { dsn, release }
#   The SSR API base URL is derived automatically from the incoming request
#   origin via ssrApiBaseUrlFactory in app.config.server.ts — no manual
#   configuration needed for same-origin deploys.
#
# SERVICE BINDING:
#   The [[services]] block below binds this Worker to the backend API Worker
#   (adblock-compiler) on the internal Cloudflare network. SSR-time /api/*
#   requests are forwarded via env.API.fetch() in server.ts — no public
#   round-trip, no CORS negotiation.
#
# SECRETS (wrangler secret put <NAME> --config frontend/wrangler.toml):
#   SENTRY_DSN     — Sentry DSN for server-side SSR error capture
#   SENTRY_RELEASE — injected at deploy time via --var, not a secret
#   CF_WEB_ANALYTICS_TOKEN must be injected into dist/.../browser/index.html
#   at build time by the CI/deploy pipeline (scripts/build-worker.sh handles
#   this — it runs after `ng build` and rewrites the {{CF_WEB_ANALYTICS_TOKEN}}
#   placeholder, or removes the analytics tag if the token is absent).
# ============================================================================

name = "adblock-frontend"

# Expose the worker on the *.workers.dev subdomain after deployment.
workers_dev = true

# Forward worker logs to Cloudflare Logpush (production only; no-op locally).
logpush = true

# Compiled server entry point output by `ng build` when ssr.entry = "server.ts"
main = "dist/adblock-compiler/server/server.mjs"

# Do NOT re-bundle the Angular SSR output. `ng build` already produces a valid
# ES-module server bundle. If wrangler re-bundles it with esbuild, imports get
# inlined and `import.meta.url` inside `polyfills.server.mjs` becomes `undefined`,
# causing `createRequire(undefined)` to throw at startup (Cloudflare error 10021).
# With no_bundle = true, wrangler uploads server.mjs and all its imported modules
# (including polyfills.server.mjs) as separate ES modules, so import.meta.url
# is correctly set for each file in the Workers runtime.
# The [[rules]] block below is also required: it tells wrangler to classify all
# .mjs files as ESModule type when walking the import graph for upload.
no_bundle = true

# Keep in sync with the main worker's compatibility_date in /wrangler.toml.
compatibility_date = "2026-01-01"

# nodejs_compat exposes Node.js built-in shims (Buffer, crypto, etc.) that
# Angular's SSR runtime depends on when running on the Workers platform.
compatibility_flags = ["nodejs_compat"]

# ─── Tail Worker ─────────────────────────────────────────────────────────────
# Same adblock-tail worker used by the backend. Cloudflare supports
# multiple producers for a single tail consumer — no extra infrastructure needed.
# IMPORTANT: adblock-tail must be deployed before this Worker.
tail_consumers = [{ service = "adblock-tail" }]

# ─── Custom domain route ─────────────────────────────────────────────────────
# IMPORTANT: [[routes]] (and [[rules]]) must appear AFTER all bare top-level
# key=value pairs. In TOML, any key between an array-of-tables header and the
# next [table] / [[table]] header is parsed as a field of that array entry —
# NOT as a top-level key. Wildcards and paths are also not allowed for
# custom_domain = true entries; use a bare hostname only.
[[routes]]
pattern = "app.bloqr.dev"
custom_domain = true

# ─── Module rules ─────────────────────────────────────────────────────────────
# Required with no_bundle = true: explicitly marks all .mjs files in the build
# output as ES modules so wrangler can resolve and upload the full import graph
# (server.mjs → polyfills.server.mjs, chunk-*.mjs, etc.).
# Without this, Cloudflare error 10021 occurs at deploy: wrangler uploads
# server.mjs but cannot find the modules it imports.
[[rules]]
type = "ESModule"
globs = ["**/*.mjs"]

# ─── Static assets ──────────────────────────────────────────────────────────
# Cloudflare serves these directly from the CDN edge before the Worker fetch
# handler is invoked, so Angular's SSR handler only receives HTML document
# requests (not JS/CSS/font fetches).
[assets]
directory = "dist/adblock-compiler/browser"
binding = "ASSETS"
# Ensures /route and /route/ resolve to the same prerendered index.html.
html_handling = "auto-trailing-slash"
# SPA fallback: unknown paths (e.g. deep-linking to /compiler) get index.html
# so Angular's client-side router handles them instead of returning a 404.
not_found_handling = "single-page-application"

# ─── Local dev server ────────────────────────────────────────────────────────
# These settings apply ONLY to `wrangler dev` / `npm run preview`.
# For active development with HMR, use `npm run start` (Angular dev server)
# instead of `npm run preview`.
[dev]
port = 4200
local_protocol = "http"

# ─── Runtime variables ───────────────────────────────────────────────────────
# Static vars injected into env at runtime. SENTRY_RELEASE is NOT listed here
# because it is injected at deploy time via `--var SENTRY_RELEASE:$GITHUB_SHA`.
# Secrets (wrangler secret put <NAME> --config frontend/wrangler.toml):
#   SENTRY_DSN     — Sentry DSN for server-side SSR error capture
#   SENTRY_RELEASE — injected at deploy time via --var, not a secret
[vars]
ENVIRONMENT = "production"
# ─── Project URLs ─────────────────────────────────────────────────────────────
# Single source of truth for all public-facing service URLs.
# When you switch to a custom domain, update these values only, or run:
#   deno task domain:swap
URL_FRONTEND     = "https://app.bloqr.dev"
URL_API          = "https://api.bloqr.dev"
URL_DOCS         = "https://docs.bloqr.dev"
URL_LANDING      = "https://bloqr.dev"
CANONICAL_DOMAIN = "bloqr.dev"

[observability.logs]
enabled = true
destinations = [ "sentry-logs" ]
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
destinations = [ "sentry-traces" ]
persist = true
head_sampling_rate = 1

# ─── Service binding to backend API Worker ────────────────────────────────────
# Allows the SSR Worker to call the backend on the internal Cloudflare network
# (no public network hop, no CORS negotiation).
[[services]]
binding = "API"
service = "adblock-compiler"

# ============================================================================
# [env.dev] — Dev environment (workers.dev, debug Angular build)
#
# Deploy workflow:
#   pnpm --filter adblock-frontend run build:dev   # ng build --configuration development
#   pnpm --filter adblock-frontend run deploy:dev  # wrangler deploy --env dev
#   OR combined:  deno task ui:deploy:ng:dev
#
# The `development` build configuration in angular.json enables:
#   sourceMap: true     — Angular DevTools browser extension can connect
#   optimization: false — readable, non-minified code; no tree-shaking
#
# All bindings (ASSETS, [[services]] API, etc.) are inherited from the
# top-level config. The API service binding still points to `adblock-compiler`
# (production backend). Override [[env.dev.services]] here if you deploy a
# separate dev API worker (`adblock-compiler-dev`).
#
# Routes: NOT inherited. This env is only accessible via *.workers.dev.
# ============================================================================
[env.dev]
logpush = false

[env.dev.vars]
ENVIRONMENT  = "development"
CANONICAL_DOMAIN = "bloqr.dev"
URL_FRONTEND = "https://app.bloqr.dev"
URL_API      = "https://api.bloqr.dev"
URL_DOCS     = "https://docs.bloqr.dev"
URL_LANDING  = "https://bloqr.dev"
