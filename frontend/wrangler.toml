# Wrangler configuration for deploying the Angular frontend to Cloudflare Workers
#
# Build output layout (produced by `npm run build` / `ng build`):
#   dist/adblock-compiler/
#   ├── browser/          ← Static assets (JS bundles, CSS, fonts, pre-rendered HTML)
#   └── server/
#       └── server.mjs    ← Workers entry point (compiled from server.ts)
#
# Deployment:
#   npm run build          # compile Angular + server
#   npm run deploy         # wrangler deploy  (uploads Worker + assets)
#
# Local dev (mirrors production):
#   npm run preview        # wrangler dev

name = "adblock-compiler-frontend"

# Compiled server entry point output by `ng build` when ssr.entry = "server.ts"
main = "dist/adblock-compiler/server/server.mjs"

# Minimum date for Cloudflare Workers compatibility guarantees.
# Bump this to enable newer platform APIs as they stabilise.
compatibility_date = "2025-01-01"

# nodejs_compat exposes Node.js built-in shims (Buffer, crypto, etc.) that
# Angular's SSR runtime depends on when running on the Workers platform.
compatibility_flags = ["nodejs_compat"]

# Static assets binding — Cloudflare serves these directly from its CDN edge
# before the Worker fetch handler is invoked, so Angular's SSR handler only
# receives HTML document requests (not JS/CSS/font fetches).
[assets]
directory = "dist/adblock-compiler/browser"
binding = "ASSETS"
# Enables SPA fallback routing: unknown paths (e.g. deep-linking to /compiler)
# are served the root index.html so Angular's client-side router can handle them
# instead of returning a 404 from the CDN edge.
not_found_handling = "single-page-application"

# ---------------------------------------------------------------------------
# Required Worker Secrets
# ---------------------------------------------------------------------------
# The following secrets must be set via `wrangler secret put` on the API Worker
# (adblock-compiler). They are NOT set here — never commit secret values to
# wrangler.toml.
#
#   wrangler secret put CLERK_PUBLISHABLE_KEY   --name adblock-compiler
#   wrangler secret put SENTRY_DSN              --name adblock-compiler
#
# The frontend Angular app fetches these at runtime from:
#   GET /api/clerk-config    → returns { publishableKey }
#   GET /api/sentry-config   → returns { dsn, release }
#
# If the API Worker is deployed on a different origin from the frontend, also
# set the absolute API base URL as a [vars] entry on this (frontend) Worker
# so server.ts can construct correct absolute URLs during SSR:
#
#   [vars]
#   API_BASE_URL = "https://adblock-compiler.<account>.workers.dev"
# ---------------------------------------------------------------------------