# ============================================================================
# frontend/wrangler.toml — Angular SSR Worker configuration
# ============================================================================
#
# Build output layout (produced by `npm run build` / `ng build`):
#   dist/adblock-compiler/
#   ├── browser/          ← Static assets (JS bundles, CSS, fonts, pre-rendered HTML)
#   └── server/
#       └── server.mjs    ← Workers entry point (compiled from server.ts)
#
# TWO ENVIRONMENTS ONLY:
#
#   Local dev  →  `npm run preview`  (runs `wrangler dev` in this directory)
#                 Angular dev server: `npm run start`  (port 4200, HMR)
#                 No .dev.vars needed — this worker owns no secrets.
#
#   Production →  `npm run build && npm run deploy`
#                 This file IS the production configuration.
#                 The SSR Worker serves HTML; static assets are served from
#                 the CDN edge before the Worker fetch handler is invoked.
#
# API Worker dependency:
#   The Angular app fetches runtime config at boot from the co-deployed API Worker:
#     GET /api/clerk-config   → returns { publishableKey }
#     GET /api/sentry-config  → returns { dsn, release }
#   The SSR API base URL is derived automatically from the incoming request
#   origin via ssrApiBaseUrlFactory in app.config.server.ts — no manual
#   configuration needed for same-origin deploys.
#
# SERVICE BINDING:
#   The [[services]] block below binds this Worker to the backend API Worker
#   (adblock-compiler) on the internal Cloudflare network. SSR-time /api/*
#   requests are forwarded via env.API.fetch() in server.ts — no public
#   round-trip, no CORS negotiation.
#
# SECRETS (wrangler secret put <NAME> --config frontend/wrangler.toml):
#   SENTRY_DSN     — Sentry DSN for server-side SSR error capture
#   SENTRY_RELEASE — injected at deploy time via --var, not a secret
#   CF_WEB_ANALYTICS_TOKEN must be injected into dist/.../browser/index.html
#   at build time by the CI/deploy pipeline (scripts/build-worker.sh handles
#   this — it runs after `ng build` and rewrites the {{CF_WEB_ANALYTICS_TOKEN}}
#   placeholder, or removes the analytics tag if the token is absent).
# ============================================================================

name = "adblock-compiler-frontend"

# Expose the worker on the *.workers.dev subdomain after deployment.
workers_dev = true

# Compiled server entry point output by `ng build` when ssr.entry = "server.ts"
main = "dist/adblock-compiler/server/server.mjs"

# Do NOT re-bundle the Angular SSR output. `ng build` already produces a valid
# ES-module server bundle. If wrangler re-bundles it with esbuild, imports get
# inlined and `import.meta.url` inside `polyfills.server.mjs` becomes `undefined`,
# causing `createRequire(undefined)` to throw at startup (Cloudflare error 10021).
# With no_bundle = true, wrangler uploads server.mjs and all its imported modules
# (including polyfills.server.mjs) as separate ES modules, so import.meta.url
# is correctly set for each file in the Workers runtime.
no_bundle = true

# Keep in sync with the main worker's compatibility_date in /wrangler.toml.
compatibility_date = "2026-01-01"

# nodejs_compat exposes Node.js built-in shims (Buffer, crypto, etc.) that
# Angular's SSR runtime depends on when running on the Workers platform.
compatibility_flags = ["nodejs_compat"]

# ─── Static assets ──────────────────────────────────────────────────────────
# Cloudflare serves these directly from the CDN edge before the Worker fetch
# handler is invoked, so Angular's SSR handler only receives HTML document
# requests (not JS/CSS/font fetches).
[assets]
directory = "dist/adblock-compiler/browser"
binding = "ASSETS"
# Ensures /route and /route/ resolve to the same prerendered index.html.
html_handling = "auto-trailing-slash"
# SPA fallback: unknown paths (e.g. deep-linking to /compiler) get index.html
# so Angular's client-side router handles them instead of returning a 404.
not_found_handling = "single-page-application"

# ─── Local dev server ────────────────────────────────────────────────────────
# These settings apply ONLY to `wrangler dev` / `npm run preview`.
# For active development with HMR, use `npm run start` (Angular dev server)
# instead of `npm run preview`.
[dev]
port = 4200
local_protocol = "http"

# ─── Runtime variables ───────────────────────────────────────────────────────
# Static vars injected into env at runtime. SENTRY_RELEASE is NOT listed here
# because it is injected at deploy time via `--var SENTRY_RELEASE:$GITHUB_SHA`.
# Secrets (wrangler secret put <NAME> --config frontend/wrangler.toml):
#   SENTRY_DSN     — Sentry DSN for server-side SSR error capture
#   SENTRY_RELEASE — injected at deploy time via --var, not a secret
[vars]
ENVIRONMENT = "production"

# ─── Tail Worker ─────────────────────────────────────────────────────────────
# Same adblock-compiler-tail worker used by the backend. Cloudflare supports
# multiple producers for a single tail consumer — no extra infrastructure needed.
# IMPORTANT: adblock-compiler-tail must be deployed before this Worker.
tail_consumers = [{ service = "adblock-compiler-tail" }]

[observability.logs]
enabled = true
destinations = [ "sentry-logs" ]
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
destinations = [ "sentry-traces" ]
persist = true
head_sampling_rate = 1

# ─── Service binding to backend API Worker ────────────────────────────────────
# Allows the SSR Worker to call the backend on the internal Cloudflare network
# (no public network hop, no CORS negotiation).
[[services]]
binding = "API"
service = "adblock-compiler"
