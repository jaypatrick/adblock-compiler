<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Orange glow filter for the bottom bar -->
    <filter id="orangeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background with rounded corners -->
  <rect width="64" height="64" rx="12" fill="#070B14"/>
  <!-- Orange accent stripe at top -->
  <rect x="0" y="0" width="64" height="3" rx="1.5" fill="#FF5500"/>
  <!-- Tri-line filter bars (centered vertically) -->
  <!-- Line 1: full width, white -->
  <rect x="12" y="20" width="40" height="6" rx="3" fill="#F1F5F9"/>
  <!-- Line 2: medium width, muted white -->
  <rect x="12" y="31" width="27" height="6" rx="3" fill="#F1F5F9" opacity="0.65"/>
  <!-- Line 3: short, orange (represents filtered/compiled output) -->
  <rect x="12" y="42" width="14" height="6" rx="3" fill="#FF5500" filter="url(#orangeGlow)"/>
  <!-- Tiny triangle arrow to the right of line 3 -->
  <path d="M28 45 L33 45 L30.5 42 Z" fill="#FF5500" opacity="0.7"/>
</svg>
