<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Bloqr — Internet Hygiene. Automated.</title>
        <base href="/">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="AI-powered adblock list management and real-time threat intelligence. Block ads, trackers, and malware at the network level — without routing your traffic anywhere.">
        <meta name="robots" content="index, follow">
        <link rel="canonical" href="{{URL_FRONTEND}}/">
        <link rel="icon" type="image/svg+xml" href="favicon.svg">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
        <link rel="shortcut icon" href="favicon.ico">
        <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

        <!-- Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Bloqr — Internet Hygiene. Automated.">
        <meta property="og:description" content="AI-powered adblock list management and real-time threat intelligence. Block ads, trackers, and malware at the network level.">
        <meta property="og:url" content="{{URL_FRONTEND}}/">
        <meta property="og:site_name" content="Bloqr">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary">
        <meta name="twitter:title" content="Bloqr — Internet Hygiene. Automated.">
        <meta name="twitter:description" content="AI-powered adblock list management and real-time threat intelligence. Block ads, trackers, and malware at the network level — without routing your traffic anywhere.">

        <!-- Structured Data -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Bloqr",
            "url": "{{URL_FRONTEND}}/",
            "description": "AI-powered adblock list management and real-time threat intelligence. Block ads, trackers, and malware at the network level.",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Any",
            "offers": {
                "@type": "Offer",
                "price": "0",
                "priceCurrency": "USD"
            },
            "author": {
                "@type": "Organization",
                "name": "jk-com",
                "url": "https://github.com/jaypatrick/adblock-compiler"
            },
            "sourceOrganization": {
                "@type": "Organization",
                "name": "jk-com",
                "url": "https://github.com/jaypatrick"
            }
        }
        </script>

        <!--
            Fonts loaded via npm packages (build-pipeline integrated, SSR-safe):
              @fontsource/space-grotesk — Space Grotesk (display/headings) 400/500/600/700 — imported in styles.css
              @fontsource/inter          — Inter (body) 400/500                              — imported in styles.css
              @fontsource/jetbrains-mono — JetBrains Mono (code) 400/700                    — imported in styles.css
              material-symbols           — Material Symbols Outlined icon font               — imported in styles.css
            No external CDN requests required at runtime.

            NOTE: Preload hints for @fontsource assets are intentionally omitted.  The Angular build
            pipeline runs with outputHashing="all", so emitted filenames include a content hash
            (e.g. space-grotesk-latin-400-normal.XXXXXXXX.woff2).  A hash-less preload href would
            never match the actual hashed filename, resulting in a wasted 404 prefetch.  The browser
            will discover and load the fonts on its own via the @import rules in styles.css.
        -->
    </head>
    <body class="mat-typography">
        <app-root></app-root>
        <!-- Cloudflare Turnstile (Item 1: Bot Protection) -->
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
        <!-- Cloudflare Web Analytics -->
        <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "{{CF_WEB_ANALYTICS_TOKEN}}"}'></script>
    </body>
</html>
