<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Bloqr — Internet Hygiene. Automated.</title>
        <base href="/">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Block ads. Block trackers. Block malware. AI-powered DNS filtering with one account. Zero setup.">
        <meta name="robots" content="index, follow">
        <link rel="canonical" href="{{URL_FRONTEND}}/">
        <link rel="icon" type="image/svg+xml" href="favicon.svg">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
        <link rel="shortcut icon" href="favicon.ico">
        <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

        <!-- Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Bloqr — Internet Hygiene. Automated.">
        <meta property="og:description" content="Block ads. Block trackers. Block malware. AI-powered DNS filtering with one account. Zero setup.">
        <meta property="og:url" content="{{URL_FRONTEND}}/">
        <meta property="og:site_name" content="Bloqr">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary">
        <meta name="twitter:title" content="Bloqr — Internet Hygiene. Automated.">
        <meta name="twitter:description" content="Block ads. Block trackers. Block malware. AI-powered DNS filtering with one account. Zero setup.">

        <!-- Structured Data -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Adblock Compiler",
            "url": "{{URL_FRONTEND}}/",
            "description": "Open-source adblock filter list compiler-as-a-service. Supports real-time streaming, batch, and async compilation modes.",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Any",
            "offers": {
                "@type": "Offer",
                "price": "0",
                "priceCurrency": "USD"
            },
            "author": {
                "@type": "Organization",
                "name": "jk-com",
                "url": "https://github.com/jaypatrick/adblock-compiler"
            },
            "sourceOrganization": {
                "@type": "Organization",
                "name": "jk-com",
                "url": "https://github.com/jaypatrick"
            }
        }
        </script>

        <!--
            Fonts loaded via npm packages (build-pipeline integrated, SSR-safe):
              @fontsource/space-grotesk  — Space Grotesk 400/500/600/700 — imported in styles.css
              @fontsource/inter          — Inter 400/500             — imported in styles.css
              @fontsource/jetbrains-mono — JetBrains Mono 400/700    — imported in styles.css
              material-symbols           — Material Symbols Outlined  — imported in styles.css
            No external CDN requests required at runtime.
        -->
    </head>
    <body class="mat-typography">
        <app-root></app-root>
        <!-- Cloudflare Turnstile (Item 1: Bot Protection) -->
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
        <!-- Cloudflare Web Analytics -->
        <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "{{CF_WEB_ANALYTICS_TOKEN}}"}'></script>
    </body>
</html>
