# `dependabot.yml` file with
# configuration for four package managers

version: 2
updates:
  # Enable version updates for pnpm (root workspace, covers frontend/)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

  # Enable version updates for npm in examples/cloudflare-worker
  # (this directory uses npm with its own package-lock.json,
  # separate from the root pnpm workspace)
  - package-ecosystem: "npm"
    directory: "/examples/cloudflare-worker"
    schedule:
      interval: "weekly"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    # Look for `Dockerfile` and `Dockerfile.container` in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    # Workflow files stored in the default location of `.github/workflows`
    # You don't need to specify `/.github/workflows` for `directory`. You can use `directory: "/"`.
    directory: "/"
    schedule:
      interval: "weekly"
