version: 2
updates:
    # GitHub Actions — keep all workflow action SHAs up to date
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: America/New_York
      open-pull-requests-limit: 5
      commit-message:
          prefix: 'chore(ci)'
      labels:
          - dependencies
          - ci
      groups:
          actions:
              patterns:
                  - '*'

    # npm packages (used via deno.json npm: imports)
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: America/New_York
      open-pull-requests-limit: 5
      commit-message:
          prefix: 'chore(deps)'
      labels:
          - dependencies
      ignore:
          # Prisma adapters should be bumped together
          - dependency-name: '@prisma/*'
            update-types: ['version-update:semver-patch']

    # Angular frontend (pnpm workspace)
    - package-ecosystem: npm
      directory: /frontend
      schedule:
          interval: weekly
          day: tuesday
          time: '09:00'
          timezone: America/New_York
      open-pull-requests-limit: 5
      commit-message:
          prefix: 'chore(frontend/deps)'
      labels:
          - dependencies
          - frontend
