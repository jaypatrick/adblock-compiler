name: 'Deploy Worker to Cloudflare'
description: 'Run database migrations, generate deployment version, set up Cloudflare resources, deploy the tail worker and main worker, and record the deployment outcome.'

inputs:
    github-sha:
        description: 'GitHub commit SHA for Sentry release tracking'
        required: true
    cloudflare-account-id:
        description: 'Cloudflare Account ID for explicit registry authentication and wrangler --account-id flag'
        required: true
    cloudflare-containers-token:
        description: 'Optional dedicated Cloudflare API token with Account > Containers:Edit permission for Docker registry auth. Falls back to CLOUDFLARE_API_TOKEN if not provided.'
        required: false
        default: ''

runs:
    using: composite
    steps:
        - name: Run database migrations
          shell: bash
          run: |
              echo "Running D1 migrations..."
              for i in 1 2 3; do
                  if output=$(deno task wrangler d1 migrations apply adblock-compiler-d1-database --remote 2>&1); then
                      echo "$output"
                      echo "✅ All migrations applied"
                      break
                  fi
                  echo "$output"
                  if echo "$output" | grep -qiE 'not authorized|7403'; then
                      echo ""
                      echo "🔐 CLOUDFLARE_API_TOKEN is missing required D1 permissions."
                      echo ""
                      echo "   The API token must have D1:Edit permission to run database migrations."
                      echo ""
                      echo "   To fix this issue:"
                      echo "   1. Go to: https://dash.cloudflare.com/profile/api-tokens"
                      echo "   2. Find your API token (or create a new one)"
                      echo "   3. Ensure it has these permissions:"
                      echo "      • Account > D1:Edit (REQUIRED for migrations)"
                      echo "      • Account > Workers:Edit (for worker deployment)"
                      echo "      • Account > Pages:Edit (for Pages deployment)"
                      echo "   4. Update the CLOUDFLARE_API_TOKEN secret in GitHub"
                      echo ""
                      echo "   Note: 'Workers:Edit' alone is NOT sufficient - D1:Edit is a separate permission!"
                      exit 1
                  fi
                  if echo "$output" | grep -qiE 'Authentication error|10000'; then
                      echo ""
                      echo "🔑 CLOUDFLARE_API_TOKEN is invalid or has expired."
                      echo ""
                      echo "   To fix this issue:"
                      echo "   1. Go to: https://dash.cloudflare.com/profile/api-tokens"
                      echo "   2. Create a new API token with:"
                      echo "      • Account > D1:Edit (REQUIRED for migrations)"
                      echo "      • Account > Workers:Edit (for worker deployment)"
                      echo "      • Account > Pages:Edit (for Pages deployment)"
                      echo "   3. Update the CLOUDFLARE_API_TOKEN secret in GitHub"
                      exit 1
                  fi
                  if [ "$i" -lt 3 ]; then
                      echo "Attempt $i failed, retrying in 15s..."
                      sleep 15
                  else
                      echo ""
                      echo "❌ All 3 migration attempts failed."
                      echo ""
                      echo "Most common causes:"
                      echo "  1. API token missing D1:Edit permission (error code 7403)"
                      echo "  2. API token expired or invalid (error code 10000)"
                      echo "  3. Network connectivity issues"
                      echo ""
                      echo "To troubleshoot:"
                      echo "  • Check that CLOUDFLARE_API_TOKEN has Account > D1:Edit permission"
                      echo "  • Verify the token at: https://dash.cloudflare.com/profile/api-tokens"
                      echo "  • Ensure CLOUDFLARE_ACCOUNT_ID is correct"
                      exit 1
                  fi
              done

        - name: Generate deployment version
          id: version
          shell: bash
          run: |
              deno run --allow-read --allow-write --allow-net --allow-env scripts/generate-deployment-version.ts

        - name: Setup Cloudflare resources
          shell: bash
          run: |
              set -euo pipefail

              create_or_confirm_queue() {
                  local name="$1"
                  echo "Ensuring queue '$name' exists..."
                  if output=$(deno task wrangler queues create "$name" 2>&1); then
                      echo "$output"
                      return 0
                  fi
                  if echo "$output" | grep -qiE 'already (exists|taken)|10004|11009'; then
                      echo "Queue '$name' already exists"
                      return 0
                  fi
                  echo "$output"
                  echo "❌ Failed to create queue '$name'. See error above."
                  exit 1
              }

              create_or_confirm_r2_bucket() {
                  local name="$1"
                  echo "Ensuring R2 bucket '$name' exists..."
                  if output=$(deno task wrangler r2 bucket create "$name" 2>&1); then
                      echo "$output"
                      return 0
                  fi
                  if echo "$output" | grep -qiE 'already (exists|taken)|10004|11009'; then
                      echo "R2 bucket '$name' already exists"
                      return 0
                  fi
                  echo "$output"
                  echo "❌ Failed to create R2 bucket '$name'. See error above."
                  exit 1
              }

              create_or_confirm_queue "adblock-compiler-worker-queue"
              create_or_confirm_queue "adblock-compiler-worker-queue-high-priority"
              create_or_confirm_queue "adblock-compiler-dlq"
              create_or_confirm_queue "adblock-compiler-error-queue"
              create_or_confirm_r2_bucket "adblock-compiler-r2-storage"

        - name: Validate token for container registry
          if: env.CLOUDFLARE_API_TOKEN != ''
          shell: bash
          env:
              CONTAINERS_TOKEN: ${{ inputs.cloudflare-containers-token != '' && inputs.cloudflare-containers-token || env.CLOUDFLARE_API_TOKEN }}
              TOKEN_SOURCE: ${{ inputs.cloudflare-containers-token != '' && 'CLOUDFLARE_CONTAINERS_TOKEN' || 'CLOUDFLARE_API_TOKEN' }}
              CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
          run: |
              echo "Validating Cloudflare token for container registry auth (using $TOKEN_SOURCE)..."
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $CONTAINERS_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/containers/images")

              if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "404" ]; then
                  # 200 = containers API accessible; 404 = no images yet — token scope is fine
                  echo "✅ Token validated for container registry (HTTP $RESPONSE)"
              elif [ "$RESPONSE" = "403" ]; then
                  echo ""
                  echo "❌ Token ($TOKEN_SOURCE) lacks required permission (HTTP 403 — Forbidden)."
                  echo ""
                  echo "   The token does not have 'Account > Cloudflare Containers:Edit'."
                  echo ""
                  echo "   Recommended fix (ZTA-aligned):"
                  echo "   1. Go to: https://dash.cloudflare.com/profile/api-tokens"
                  echo "   2. Create a new token with ONLY: Account > Cloudflare Containers:Edit"
                  echo "   3. Add it as GitHub secret: CLOUDFLARE_CONTAINERS_TOKEN"
                  echo "      (Settings → Secrets and variables → Actions → New repository secret)"
                  echo "   4. The ci.yml workflow already passes this secret to the action — no"
                  echo "      workflow file changes are needed once the secret exists."
                  echo ""
                  exit 1
              elif [ "$RESPONSE" = "401" ]; then
                  echo ""
                  echo "❌ Token ($TOKEN_SOURCE) is invalid or has expired (HTTP 401 — Unauthorized)."
                  echo ""
                  echo "   To fix this issue:"
                  echo "   1. Go to: https://dash.cloudflare.com/profile/api-tokens"
                  echo "   2. Verify $TOKEN_SOURCE has not expired or been revoked"
                  echo "   3. Re-create the token if needed and update the GitHub secret"
                  echo ""
                  exit 1
              else
                  echo ""
                  echo "❌ Unexpected response from Cloudflare API (HTTP $RESPONSE)."
                  echo ""
                  echo "   This may be a transient network issue. If it persists:"
                  echo "   1. Check https://www.cloudflarestatus.com for outages"
                  echo "   2. Verify CLOUDFLARE_ACCOUNT_ID is correct"
                  echo "      (find it at: https://dash.cloudflare.com → select your account → Overview)"
                  echo "   3. Ensure the token has Account > Cloudflare Containers:Edit permission"
                  echo ""
                  exit 1
              fi

        - name: Authenticate Docker with Cloudflare Container Registry
          if: env.CLOUDFLARE_API_TOKEN != ''
          shell: bash
          env:
              CONTAINERS_TOKEN: ${{ inputs.cloudflare-containers-token != '' && inputs.cloudflare-containers-token || env.CLOUDFLARE_API_TOKEN }}
              TOKEN_SOURCE: ${{ inputs.cloudflare-containers-token != '' && 'CLOUDFLARE_CONTAINERS_TOKEN' || 'CLOUDFLARE_API_TOKEN' }}
          run: |
              echo "Authenticating Docker with registry.cloudflare.com (using $TOKEN_SOURCE)..."
              if ! echo "$CONTAINERS_TOKEN" | docker login registry.cloudflare.com \
                --username "cloudflare" \
                --password-stdin; then
                  echo ""
                  echo "❌ Docker authentication with registry.cloudflare.com failed."
                  echo ""
                  echo "   Token validation passed but Docker login still failed."
                  echo "   This is unexpected — please check:"
                  echo "   • That $TOKEN_SOURCE has Account > Cloudflare Containers:Edit"
                  echo "   • That $TOKEN_SOURCE has not been revoked between validation and login"
                  echo "   • https://www.cloudflarestatus.com for any Cloudflare Container Registry outages"
                  echo ""
                  exit 1
              fi
              echo "✅ Docker authenticated with registry.cloudflare.com"

        - name: Deploy Tail Worker
          if: env.CLOUDFLARE_API_TOKEN != ''
          shell: bash
          env:
              WRANGLER_LOG: debug
          run: |
              echo "Deploying tail worker (adblock-tail)..."
              TAIL_DEPLOYED=false
              for i in 1 2 3; do
                  if deno task wrangler deploy --config wrangler.tail.toml --var SENTRY_RELEASE:${{ inputs.github-sha }} --account-id "${{ inputs.cloudflare-account-id }}"; then
                      TAIL_DEPLOYED=true
                      break
                  fi
                  if [ "$i" -lt 3 ]; then
                      echo "Attempt $i failed, retrying in 15s..."
                      sleep 15
                  fi
              done
              if [ "$TAIL_DEPLOYED" = "false" ]; then
                  echo "::warning::Tail worker (adblock-tail) failed to deploy after 3 attempts. Main worker deployment will continue."
                  echo "Tail worker deploy failed — continuing with main worker deployment."
              fi

        - name: Verify Docker for container build
          if: env.CLOUDFLARE_API_TOKEN != ''
          shell: bash
          env:
              DOCKER_BUILDKIT: '1'
          run: |
              echo "Pre-building Dockerfile.container to surface errors before wrangler deploy..."
              docker build \
                --platform linux/amd64 \
                -f Dockerfile.container \
                --no-cache \
                . 2>&1
              echo "✅ Dockerfile.container pre-build succeeded"

        - name: Deploy Worker
          id: deploy
          if: env.CLOUDFLARE_API_TOKEN != ''
          shell: bash
          run: |
              echo "Deploying version: ${{ steps.version.outputs.full_version }}"
              DEPLOY_SUCCESS=false
              for i in 1 2 3; do
                  if deno task wrangler deploy --var SENTRY_RELEASE:${{ inputs.github-sha }} --account-id "${{ inputs.cloudflare-account-id }}"; then
                      DEPLOY_SUCCESS=true
                      echo "✅ Worker deployed successfully"
                      break
                  fi
                  # Default wrangler log dir per https://developers.cloudflare.com/workers/wrangler/commands/#logs
                  WRANGLER_LOG=""
                  WRANGLER_LOG_DIR="$HOME/.config/.wrangler/logs"
                  if [ -d "$WRANGLER_LOG_DIR" ]; then
                      shopt -s nullglob
                      WRANGLER_LOG_FILES=("$WRANGLER_LOG_DIR"/wrangler-*.log)
                      shopt -u nullglob
                      if [ "${#WRANGLER_LOG_FILES[@]}" -gt 0 ]; then
                          WRANGLER_LOG="${WRANGLER_LOG_FILES[${#WRANGLER_LOG_FILES[@]}-1]}"
                      fi
                  fi
                  if [ -n "$WRANGLER_LOG" ]; then
                      echo "--- Wrangler log (attempt $i) ---"
                      tail -50 "$WRANGLER_LOG"
                  fi
                  if [ "$i" -lt 3 ]; then
                      echo "⚠️ Deploy attempt $i failed, retrying in 30s..."
                      sleep 30
                  fi
              done
              if [ "$DEPLOY_SUCCESS" = "false" ]; then
                  echo "❌ All 3 deploy attempts failed."
                  exit 1
              fi

        - name: Record deployment
          if: success() && env.CLOUDFLARE_API_TOKEN != ''
          shell: bash
          run: |
              deno run --allow-read --allow-net --allow-env scripts/record-deployment.ts --status=success

        - name: Record failed deployment
          if: failure() && env.CLOUDFLARE_API_TOKEN != ''
          shell: bash
          run: |
              deno run --allow-read --allow-net --allow-env scripts/record-deployment.ts --status=failed || true
