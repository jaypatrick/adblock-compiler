name: 'ZTA Security Checks'
description: 'Run all Zero Trust Architecture security lint checks: wildcard CORS, hardcoded secrets, eval/new Function, string-interpolated SQL, unsafe innerHTML, localStorage auth token storage, missing input validation, and sensitive data logging.'

runs:
    using: composite
    steps:
        - name: Check for wildcard CORS on authenticated endpoints
          shell: bash
          run: |
              set -euo pipefail
              # cors.ts intentionally uses '*' for public read-only endpoints via getPublicCorsHeaders();
              # test files assert the correct '*' response — both are expected and safe to exclude.
              if grep -rn --exclude='cors.ts' --exclude='*.test.*' 'Access-Control-Allow-Origin.*[*]' worker/ src/ frontend/src/ 2>/dev/null; then
                  echo "❌ ZTA VIOLATION: Wildcard CORS (Access-Control-Allow-Origin: *) found outside the public CORS helper"
                  exit 1
              fi
              echo "✅ No wildcard CORS found (excluding public CORS helper and tests)"

        - name: Check for hardcoded secrets
          shell: bash
          run: |
              set -euo pipefail
              if grep -rPn "ADMIN_KEY\s*=\s*[\"'][^\$]" worker/ src/ frontend/src/ 2>/dev/null; then
                  echo "❌ ZTA VIOLATION: Possible hardcoded ADMIN_KEY secret found in worker/, src/, or frontend/src/"
                  exit 1
              fi
              echo "✅ No hardcoded secrets detected"

        - name: Check for eval and new Function usage
          shell: bash
          run: |
              set -euo pipefail
              # Only check worker/ and frontend/src/ — these are the internet-facing surfaces.
              # src/ is the build-time compiler and legitimately uses new Function() to
              # evaluate adblock filter conditions at compile time (ConditionalEvaluator.ts).
              if grep -rPn "\beval\s*\(" worker/ frontend/src/ 2>/dev/null; then
                  echo "❌ ZTA VIOLATION: eval() usage found in worker/ or frontend/src/"
                  exit 1
              fi
              if grep -rPn "\bnew\s+Function\s*\(" worker/ frontend/src/ 2>/dev/null; then
                  echo "❌ ZTA VIOLATION: new Function() usage found in worker/ or frontend/src/"
                  exit 1
              fi
              echo "✅ No eval() or new Function() usage found"

        - name: Check for string-interpolated SQL
          shell: bash
          run: |
              set -euo pipefail
              # Flag template literals containing SQL keywords with variable interpolation.
              # All D1 queries must use .prepare().bind() for parameterized values.
              # Excluded files have known-safe dynamic SQL patterns:
              #   migrate.ts           — interpolates an allowlist-validated table *name* in .prepare()
              #   admin-*-service.ts   — dynamic SET clause builders; structure interpolated, values via .bind()
              #   admin-users.ts       — same SET clause builder pattern
              # Pattern: backtick-delimited template literal containing SQL keyword + ${...} interpolation.
              # Use a variable to avoid shell quoting conflicts with backtick characters.
              SQL_TMPL_PATTERN='`[^`]*(SELECT|INSERT|UPDATE|DELETE)\b[^`]*\$\{'
              if grep -rPn \
                  --exclude='migrate.ts' \
                  --exclude='admin-feature-flag-service.ts' \
                  --exclude='admin-config-service.ts' \
                  --exclude='admin-role-service.ts' \
                  --exclude='admin-users.ts' \
                  "$SQL_TMPL_PATTERN" worker/ 2>/dev/null; then
                  echo "❌ ZTA VIOLATION: String-interpolated SQL found in worker/ — use .prepare().bind() instead"
                  exit 1
              fi
              echo "✅ No string-interpolated SQL found"

        - name: Check for dangerous innerHTML usage
          shell: bash
          run: |
              set -euo pipefail
              SAFE_PATTERNS='test|spec|\.d\.ts|// |DomSanitizer|sanitize|bypassSecurity|\[innerHTML\]|matTooltip|tooltipText'
              if grep -rn 'innerHTML' worker/ frontend/src/ --include='*.ts' --include='*.html' 2>/dev/null | grep -vE "$SAFE_PATTERNS" | grep -q '.'; then
                  echo "❌ ZTA VIOLATION: Found unsafe innerHTML assignment. Use Angular's DomSanitizer or template binding."
                  exit 1
              fi
              echo "✅ No unsafe innerHTML usage found"

        - name: Check for localStorage auth token storage
          shell: bash
          run: |
              set -euo pipefail
              if grep -rEn 'localStorage\.setItem.*[Tt]oken|localStorage\.setItem.*[Aa]uth|localStorage\.setItem.*[Jj]wt' worker/ frontend/src/ --include='*.ts' 2>/dev/null | grep -vE 'test|spec|\.d\.ts|// ' | grep -q '.'; then
                  echo "❌ ZTA VIOLATION: Found auth token storage in localStorage. Use Better Auth / BetterAuthService for auth state management."
                  exit 1
              fi
              echo "✅ No localStorage auth token usage found"

        - name: Check for missing input validation on API routes
          shell: bash
          run: |
              set -euo pipefail
              if grep -rEn 'request\.json\(\)|req\.body' worker/ --include='*.ts' 2>/dev/null | grep -vE 'test|spec|\.d\.ts|// |zod|\.parse\(|\.safeParse\(' | grep -q '.'; then
                  echo "::warning::Found API routes potentially missing Zod input validation. Ensure all request bodies are validated."
              fi
              echo "✅ Input validation check complete"

        - name: Check for console.log with sensitive data patterns
          shell: bash
          run: |
              set -euo pipefail
              if grep -rEn 'console\.log.*(password|token|secret|key)' worker/ src/ --include='*.ts' 2>/dev/null | grep -vE 'test|spec|\.d\.ts|// |api\.key|apiKey|keyHash|keyPrefix' | grep -q '.'; then
                  echo "::warning::Found potential sensitive data logging. Review console.log statements."
              fi
              echo "✅ Sensitive data logging check complete"
