# Neon Database Branch — Cleanup
#
# Deletes a Neon database branch when it is no longer needed.
# Triggered by three events:
#
#   1. pull_request [closed] — PR merged or abandoned; deletes `pr-<number>`.
#                              Uses the same `paths` filter as neon-branch-create.yml
#                              so cleanup only runs when a branch could have been
#                              created in the first place.
#   2. delete               — Git branch deleted directly (CLI, GitHub UI, API,
#                             Copilot agent branches, etc.); deletes a Neon
#                             branch with the same name as the deleted git branch.
#                             GitHub does not support `paths` on the `delete` event;
#                             the neondatabase/delete-branch-action handles missing
#                             branches gracefully (exits without error).
#   3. workflow_dispatch    — Manual cleanup of any named Neon branch.
#                             No `paths` filter so manual runs always work.
#
# This keeps the Neon project tidy and avoids accumulating stale branches
# that count against quotas.  The branch name convention for PR branches is
# `pr-<number>`, matching what neon-branch-create.yml produces.
#
# Phase 0 of the Neon PostgreSQL migration.
#
# Required repository secrets:
#   NEON_API_KEY    – Neon API token
#   NEON_PROJECT_ID – Neon project ID

name: 'Neon Branch: Cleanup'

on:
  pull_request:
    types: [closed]
    paths:
      - 'prisma/**'
      - 'prisma.config.ts'
      - 'worker/lib/auth.ts'
      - 'worker/lib/prisma.ts'
      - 'worker/middleware/better-auth-provider.ts'
      - 'worker/middleware/prisma-middleware.ts'
  delete:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Neon branch name to delete (e.g. pr-123 or feat/my-feature)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  check-prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    # Skip for Dependabot PRs — no branch was created for them (see
    # neon-branch-create.yml), and repository secrets are not available.
    # Also skip tag deletions; this workflow only cares about deleted branches.
    if: >
      (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]') &&
      (github.event_name != 'delete' || github.event.ref_type == 'branch')
    steps:
      - name: Check required secrets
        id: check
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          ready=true

          if [ -z "$NEON_API_KEY" ]; then
            ready=false
            echo "::warning::NEON_API_KEY is not configured. Skipping Neon branch deletion."
          fi

          if [ -z "$NEON_PROJECT_ID" ]; then
            ready=false
            echo "::warning::NEON_PROJECT_ID is not configured. Skipping Neon branch deletion."
          fi

          if [ "$ready" != "true" ]; then
            echo "::warning::Add NEON_API_KEY and NEON_PROJECT_ID in repository Settings → Secrets and Variables → Actions."
          fi

          echo "ready=$ready" >> "$GITHUB_OUTPUT"

  delete-neon-branch:
    name: Delete Neon Branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check-prerequisites]
    if: |
      needs.check-prerequisites.outputs.ready == 'true' &&
      (github.event_name != 'delete' || github.event.ref_type == 'branch')

    steps:
      # ── 1. Resolve the Neon branch name from the trigger context ───────────
      - name: Resolve branch name
        id: branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DELETED_REF: ${{ github.event.ref }}
          DISPATCH_BRANCH: ${{ inputs.branch_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "branch_name=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "delete" ]; then
            echo "branch_name=${DELETED_REF}" >> "$GITHUB_OUTPUT"
          else
            echo "branch_name=${DISPATCH_BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Delete the Neon branch ──────────────────────────────────────────
      # First check whether the branch actually exists in the Neon project.
      # Many git branches (e.g. copilot agent branches, hotfix branches) never
      # have a corresponding Neon branch created; in those cases we skip
      # deletion silently rather than suppressing all errors with
      # continue-on-error which would hide real failures like auth errors.
      - name: Check if Neon branch exists
        id: neon_check
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        run: |
          set -euo pipefail
          HTTP_STATUS=$(curl -s -o /tmp/neon_branches.json -w "%{http_code}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Neon API returned HTTP ${HTTP_STATUS} when listing branches." >&2
            cat /tmp/neon_branches.json >&2
            exit 1
          fi
          BRANCH_ID=$(jq -r --arg name "${BRANCH_NAME}" \
            '.branches[] | select(.name == $name) | .id // empty' /tmp/neon_branches.json)
          if [ -n "$BRANCH_ID" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Neon branch '${BRANCH_NAME}' found (id: ${BRANCH_ID}) — will delete."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Neon branch '${BRANCH_NAME}' not found — skipping deletion."
          fi

      - name: Delete Neon database branch
        if: steps.neon_check.outputs.exists == 'true'
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3.2.1
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ${{ steps.branch.outputs.branch_name }}
          api_key: ${{ secrets.NEON_API_KEY }}
