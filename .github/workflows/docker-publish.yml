name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME  — Docker Hub username: jaysonknight
#   DOCKERHUB_TOKEN     — Docker Hub personal access token with Read & Write scope
#                         for jaysonknight/adblock-compiler and
#                         jaysonknight/adblock-compiler-container

on:
  schedule:
    # Daily rebuild to pick up upstream base-image security updates.
    # Both the desktop image and the Cloudflare container image are rebuilt.
    - cron: '34 19 * * *'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.container'
      - 'src/**'
      - 'worker/**'
      - 'deno.json'
      - 'deno.lock'
      # NOTE: The paths filter above also applies to tag pushes (v*.*.*). The automated release
      # flow always modifies deno.json on version bumps, ensuring semver tags trigger this workflow.
      # If a tag is created on a commit that does not touch any of the listed paths, the Docker
      # build and publish will be silently skipped for that release.
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.container'

env:
  GHCR_REGISTRY: ghcr.io
  # GHCR image path — keeps existing GHCR consumers working
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  # Docker Hub image for the Docker Desktop dev image
  DOCKERHUB_IMAGE: jaysonknight/adblock-compiler
  # Docker Hub image for the Cloudflare Containers production image
  DOCKERHUB_CONTAINER_IMAGE: jaysonknight/adblock-compiler-container


jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build and push the Docker Desktop dev image (Dockerfile)
  # Pushes to:
  #   - ghcr.io/jaypatrick/adblock-compiler  (GHCR consumers)
  #   - docker.io/jaysonknight/adblock-compiler  (Docker Desktop / Docker Hub)
  # ─────────────────────────────────────────────────────────────────────────────
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: 'v3.0.5'

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Login to GHCR except on PR
      - name: Log into GHCR (${{ env.GHCR_REGISTRY }})
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Login to Docker Hub except on PR
      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker — targets both registries
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=desktop
          # mode=min only caches the final-stage layers, keeping cache writes well under
          # the GHA 5 GB limit. mode=max cached every intermediate stage and was hitting
          # the limit, causing "error writing layer blob: failed to parse error response 502".
          cache-to: type=gha,mode=min,scope=desktop

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build and push the Cloudflare Containers production image
  # (Dockerfile.container — linux/amd64 only, as required by Cloudflare)
  # Pushes to:
  #   - docker.io/jaysonknight/adblock-compiler-container
  # ─────────────────────────────────────────────────────────────────────────────
  build-container:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Login to Docker Hub except on PR
      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract metadata (tags, labels) for the container image
      - name: Extract Docker metadata (container)
        id: meta-container
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.DOCKERHUB_CONTAINER_IMAGE }}

      # Build and push Dockerfile.container for linux/amd64 only
      # (Cloudflare Containers requires amd64; multi-platform is not supported)
      - name: Build and push Cloudflare container image
        id: build-and-push-container
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.container
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-container.outputs.tags }}
          labels: ${{ steps.meta-container.outputs.labels }}
          cache-from: type=gha,scope=container
          cache-to: type=gha,mode=min,scope=container
