name: Benchmark

on:
    push:
        branches: [main]
        paths:
            - 'src/**'
            - 'deno.json'
            - 'deno.lock'
    pull_request:
        branches: [main]
        paths:
            - 'src/**'
            - 'deno.json'
            - 'deno.lock'
    workflow_dispatch:

env:
    DENO_VERSION: '2.x'

jobs:
    bench:
        name: Run Benchmarks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Run benchmarks (JSON output)
              run: deno task bench:json > bench-results.json || deno bench --allow-read --allow-write --allow-net --allow-env --json src/**/*.bench.ts > bench-results.json

            - name: Upload benchmark results
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: bench-results-${{ github.sha }}
                  path: bench-results.json
                  retention-days: 90

            - name: Post benchmark summary
              if: always() && hashFiles('bench-results.json') != ''
              run: |
                  echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo '```json' >> $GITHUB_STEP_SUMMARY
                  cat bench-results.json >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
