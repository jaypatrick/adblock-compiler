name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
            force_deploy_frontend:
                description: 'Force deploy the frontend worker even if no frontend files changed'
                required: false
                default: 'false'
                type: choice
                options:
                    - 'false'
                    - 'true'

env:
    DENO_VERSION: '2.x'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Detect Changed Paths
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        outputs:
            compiler: ${{ steps.filter.outputs.compiler }}
            frontend: ${{ steps.filter.outputs.frontend }}
            migrations: ${{ steps.filter.outputs.migrations }}
            worker: ${{ steps.filter.outputs.worker }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Detect changed paths
              id: filter
              uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
              with:
                  filters: |
                      compiler:
                          - 'src/**'
                          - '!src/**/*.test.ts'
                          - 'deno.json'
                          - 'deno.lock'
                      frontend:
                          - 'frontend/**'
                          - 'pnpm-lock.yaml'
                      migrations:
                          - 'migrations/**'
                          - 'admin-migrations/**'
                      worker:
                          - 'worker/**'
                          - 'src/**'
                          - 'wrangler.toml'

    lint-format:
        name: Lint & Format Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [changes]
        if: needs.changes.outputs.compiler == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}
                  install-deps: 'false'

            - name: Lint
              run: deno lint

            - name: Format check
              run: deno fmt --check

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [changes]
        if: needs.changes.outputs.compiler == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Type check all entry points
              run: deno task check

    test:
        name: Test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        needs: [changes]
        if: needs.changes.outputs.compiler == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Load environment variables
              uses: ./.github/actions/setup-env

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Run tests with coverage
              run: deno task test:coverage
              env:
                  DENO_TLS_CA_STORE: system

            - name: Generate coverage report
              if: always() && hashFiles('coverage/**') != ''
              continue-on-error: true
              run: deno coverage coverage --lcov --output=coverage/lcov.info

            - name: Upload coverage to Codecov
              if: always() && hashFiles('coverage/lcov.info') != ''
              uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
              continue-on-error: true
              with:
                  files: coverage/lcov.info
                  flags: deno
                  fail_ci_if_error: false

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        timeout-minutes: 15
        # Security scan should not block deployments
        continue-on-error: true
        permissions:
            contents: read
            security-events: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
              continue-on-error: true
              with:
                  scan-type: fs
                  scan-ref: .
                  format: sarif
                  output: trivy-results.sarif
                  severity: 'CRITICAL,HIGH,MEDIUM'

            - name: Upload Trivy results to GitHub Security
              if: always() && hashFiles('trivy-results.sarif') != ''
              uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
              continue-on-error: true
              with:
                  sarif_file: trivy-results.sarif

    frontend-lint-test:
        name: Frontend (lint, test)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [changes]
        if: needs.changes.outputs.frontend == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup pnpm and Node.js
              uses: ./.github/actions/setup-pnpm-node
              with:
                  node-version: '22'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint frontend
              run: pnpm --filter adblock-frontend run lint

            - name: Test frontend
              run: pnpm --filter adblock-frontend run test

    frontend-build:
        name: Frontend (build)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [changes]
        if: >-
            needs.changes.outputs.frontend == 'true' ||
            needs.changes.outputs.worker == 'true' ||
            needs.changes.outputs.compiler == 'true' ||
            (github.event.inputs.force_deploy_frontend || 'false') == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup pnpm and Node.js
              uses: ./.github/actions/setup-pnpm-node
              with:
                  node-version: '22'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Angular frontend
              run: pnpm --filter adblock-frontend run build

            - name: Upload frontend build artifact
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: frontend-dist
                  path: frontend/dist/
                  retention-days: 1

    validate-artifacts:
        name: Validate Generated Artifacts
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [changes]
        if: needs.changes.outputs.compiler == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Validate OpenAPI specification
              run: deno task openapi:validate

            - name: Regenerate all artifacts
              run: deno task schema:generate

            - name: Check all artifacts are up to date
              run: |
                  DRIFT=0
                  if ! git diff --quiet docs/api/cloudflare-schema.yaml; then
                      echo "❌ docs/api/cloudflare-schema.yaml is out of date!"
                      echo ""
                      git diff docs/api/cloudflare-schema.yaml
                      DRIFT=1
                  fi
                  if ! git diff --quiet docs/postman/postman-collection.json docs/postman/postman-environment.json; then
                      echo "❌ Postman collection or environment is out of date!"
                      echo ""
                      git diff docs/postman/postman-collection.json docs/postman/postman-environment.json
                      DRIFT=1
                  fi
                  if [ "$DRIFT" -eq 1 ]; then
                      echo ""
                      echo "Run 'deno task schema:generate' locally, commit the updated files, and push again."
                      echo "Tip: run 'deno task setup:hooks' to catch drift automatically before every push."
                      exit 1
                  fi
                  echo "✅ All generated artifacts are up to date"

    check-slow-types:
        name: Check Slow Types
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [changes]
        if: needs.changes.outputs.compiler == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Check for slow types
              run: deno publish --dry-run --allow-dirty

    audit-public-surface:
        name: Audit Public Surface (IP Protection)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [changes]
        if: needs.changes.outputs.compiler == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Audit public surface for IP leaks
              run: |
                  set -euo pipefail
                  # Capture the dry-run output; grep for lines listing files to be published
                  # deno publish --dry-run prints each file it would publish, one per line
                  PUBLISHED=$(deno publish --dry-run --allow-dirty 2>&1 | grep -oP '(?<=  )\S+' || true)
                  LEAKED=$(echo "$PUBLISHED" | grep -E "^(worker/|frontend/|prisma/|migrations/)" || true)
                  if [ -n "$LEAKED" ]; then
                    echo "❌ IP LEAK DETECTED: The following files from private packages are in the JSR publish surface:"
                    echo "$LEAKED"
                    exit 1
                  fi
                  echo "✅ Public surface audit passed — no private package files detected"

    validate-migrations:
        name: Validate Migrations
        runs-on: ubuntu-latest
        timeout-minutes: 5
        needs: [changes]
        if: needs.changes.outputs.migrations == 'true'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}
                  install-deps: 'false'

            - name: Validate migration file naming and ordering
              run: deno task migrate:validate

    zta-lint:
        name: ZTA Lint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [changes]
        if: needs.changes.outputs.worker == 'true' || needs.changes.outputs.frontend == 'true'
        permissions:
            contents: read
        continue-on-error: false
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Run ZTA security checks
              uses: ./.github/actions/zta-checks

    ci-gate:
        name: CI Gate
        runs-on: ubuntu-latest
        timeout-minutes: 5
        needs:
            - changes
            - lint-format
            - typecheck
            - test
            - validate-artifacts
            - validate-migrations
            - frontend-lint-test
            - frontend-build
            - check-slow-types
            - audit-public-surface
            - verify-deploy
            # zta-lint uses path filters and will be skipped when no relevant files change;
            # the gate's Python logic treats 'skipped' as passing, so this is safe to include.
            - zta-lint
        if: ${{ always() && !cancelled() }}
        steps:
            - name: Check all jobs passed
              env:
                  NEEDS_JSON: ${{ toJSON(needs) }}
              run: |
                  echo "Job results: $NEEDS_JSON"
                  python3 - <<'PY'
                  import os
                  import json

                  needs = json.loads(os.environ['NEEDS_JSON'])
                  cancelled = [name for name, data in needs.items() if data['result'] == 'cancelled']
                  if cancelled:
                      print('Run interrupted by concurrency cancellation (cancelled jobs: ' + ', '.join(cancelled) + ')')
                      print('A newer run will verify these checks — exiting gracefully.')
                      raise SystemExit(0)
                  failures = [name for name, data in needs.items() if data['result'] not in ('success', 'skipped')]
                  if failures:
                      print('FAILED: ' + ', '.join(failures))
                      raise SystemExit(1)
                  print('All checks passed')
                  PY

            - name: Write CI summary
              if: always()
              env:
                  NEEDS_JSON: ${{ toJSON(needs) }}
              run: |
                  python3 - <<'PY'
                  import os, json
                  needs = json.loads(os.environ['NEEDS_JSON'])
                  lines = ["## CI Gate Summary", "", "| Job | Result |", "|---|---|"]
                  icons = {'success': '✅', 'failure': '❌', 'skipped': '⏭️', 'cancelled': '🚫'}
                  for name, data in needs.items():
                      result = data['result']
                      icon = icons.get(result, '❓')
                      lines.append(f"| `{name}` | {icon} {result} |")
                  print('\n'.join(lines))
                  with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                      f.write('\n'.join(lines) + '\n')
                  PY


    publish:
        name: Publish to JSR
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [ci-gate, changes]
        # Must use always() because ci-gate depends on verify-deploy which is skipped on push.
        # Without always(), GitHub Actions skips downstream jobs due to transitive skip behavior.
        if: >-
            always() &&
            needs.ci-gate.result == 'success' &&
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            needs.changes.outputs.compiler == 'true'
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Publish to JSR
              run: |
                  set -euo pipefail
                  if ! OUTPUT="$(deno publish --allow-dirty 2>&1)"; then
                    echo "${OUTPUT}"
                    if echo "${OUTPUT}" | grep -qiE 'version .*already (exists|published)'; then
                      echo "Version already published, skipping."
                      exit 0
                    fi
                    echo "Publish failed with unexpected error."
                    exit 1
                  fi
                  echo "Successfully published to JSR"

    # Verify the worker bundles correctly on every PR — catches build failures
    # before they reach main. No secrets required; --dry-run bundles without
    # uploading to Cloudflare. Runs in parallel with other checks (only waits
    # for frontend-build to produce the artifact) so failures are surfaced fast.
    verify-deploy:
        name: Verify Worker Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [changes, frontend-build]
        if: >-
            always() &&
            (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
            (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
            (needs.changes.outputs.worker == 'true' || needs.changes.outputs.frontend == 'true')
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Validate wrangler.toml
              uses: ./.github/actions/validate-wrangler-toml

            - name: Load environment variables
              uses: ./.github/actions/setup-env

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Download frontend build artifact
              if: needs.frontend-build.result == 'success'
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: frontend-dist
                  path: frontend/dist/

            - name: Verify worker build (dry run)
              run: |
                  for i in 1 2 3; do
                      deno task wrangler:verify && break
                      if [ "$i" -lt 3 ]; then
                          echo "Attempt $i failed, retrying in 15s..."
                          sleep 15
                      else
                          echo "All 3 attempts failed."
                          exit 1
                      fi
                  done

    # Deploy jobs only run on main pushes
    deploy:
        name: Deploy to Cloudflare
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [ci-gate, changes, frontend-build]
        # Must use always() because ci-gate depends on verify-deploy which is skipped on push.
        # Without always(), GitHub Actions skips downstream jobs due to transitive skip behavior.
        # frontend-build always runs when worker or compiler files change (same triggers as this
        # job), so the frontend artifact is always available when the deploy runs.
        if: >-
            always() &&
            needs.ci-gate.result == 'success' &&
            (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            (needs.changes.outputs.worker == 'true' || needs.changes.outputs.compiler == 'true')
        permissions:
            contents: read
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CF_WEB_ANALYTICS_TOKEN }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Validate wrangler.toml
              uses: ./.github/actions/validate-wrangler-toml

            - name: Load environment variables
              uses: ./.github/actions/setup-env

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Download frontend build artifact
              if: needs.frontend-build.result == 'success'
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: frontend-dist
                  path: frontend/dist/

            - name: Deploy worker
              uses: ./.github/actions/deploy-worker
              with:
                  github-sha: ${{ github.sha }}

    deploy-frontend:
        name: Deploy Frontend Worker
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [ci-gate, changes, frontend-build]
        # Must use always() because ci-gate depends on verify-deploy which is skipped on push.
        # Without always(), GitHub Actions skips downstream jobs due to transitive skip behavior.
        if: >-
            always() &&
            needs.ci-gate.result == 'success' &&
            needs.frontend-build.result == 'success' &&
            github.ref == 'refs/heads/main' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
            (needs.changes.outputs.frontend == 'true' || (github.event.inputs.force_deploy_frontend || 'false') == 'true')
        permissions:
            contents: read
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CF_WEB_ANALYTICS_TOKEN }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Download frontend build artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: frontend-dist
                  path: frontend/dist/

            - name: Inject CF Web Analytics token into built HTML
              env:
                  CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CF_WEB_ANALYTICS_TOKEN }}
              run: sh scripts/build-worker.sh

            - name: Deploy Frontend Worker
              if: env.CLOUDFLARE_API_TOKEN != ''
              working-directory: frontend
              run: |
                  echo "Deploying adblock-frontend..."
                  pnpm run deploy
