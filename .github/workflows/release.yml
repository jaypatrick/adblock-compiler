name: Release

on:
    push:
        tags:
            - 'v*'
            - 'compiler-v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to release (e.g., 0.8.0)'
                required: true
                type: string

env:
    DENO_VERSION: '2.x'

permissions:
    contents: write

jobs:
    # Validate before building anything
    validate:
        name: Validate Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Cache Deno dependencies
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: |
                      ~/.cache/deno
                      ~/.deno
                  key: deno-${{ runner.os }}-${{ hashFiles('deno.json', 'deno.lock') }}
                  restore-keys: |
                      deno-${{ runner.os }}-

            - name: Install dependencies
              run: |
                  deno install
                  deno cache src/index.ts src/cli.ts
              env:
                  DENO_TLS_CA_STORE: system

            # fmt and lint are already enforced by ci.yml before any tag reaches here;
            # only type-check and test are needed as a safety net at release time.
            # Use deno tasks so worker/ targets get --sloppy-imports (prisma generated .js imports).
            - name: Run validation
              run: |
                  deno task check
                  deno task test

    build-binaries:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        needs: validate
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: adblock-compiler-linux-x64
                      compressed_artifact: adblock-compiler-linux-x64.tar.gz
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: adblock-compiler-linux-arm64
                      compressed_artifact: adblock-compiler-linux-arm64.tar.gz
                    - target: x86_64-apple-darwin
                      os: macos-15-intel
                      artifact: adblock-compiler-macos-x64
                      compressed_artifact: adblock-compiler-macos-x64.tar.gz
                    - target: aarch64-apple-darwin
                      os: macos-14
                      artifact: adblock-compiler-macos-arm64
                      compressed_artifact: adblock-compiler-macos-arm64.tar.gz
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      artifact: adblock-compiler-windows-x64.exe
                      compressed_artifact: adblock-compiler-windows-x64.exe.zip
        steps:
            - name: Configure git for long paths (Windows)
              if: runner.os == 'Windows'
              run: git config --global core.longpaths true

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Cache Deno dependencies
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: |
                      ~/.cache/deno
                      ~/.deno
                  key: deno-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('deno.json', 'deno.lock') }}
                  restore-keys: |
                      deno-${{ runner.os }}-${{ matrix.target }}-
                      deno-${{ runner.os }}-

            - name: Install dependencies
              run: deno install
              env:
                  DENO_TLS_CA_STORE: system

            - name: Build binary
              run: deno compile --allow-read --allow-write --allow-net --target ${{ matrix.target }} --output ${{ matrix.artifact }} src/cli.ts

            - name: Compress artifact
              shell: bash
              run: |
                  mkdir -p compressed
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    7z a "compressed/${{ matrix.compressed_artifact }}" "${{ matrix.artifact }}"
                  else
                    tar -czf "compressed/${{ matrix.compressed_artifact }}" "${{ matrix.artifact }}"
                  fi

            - name: Upload artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: ${{ matrix.artifact }}
                  path: compressed/*
                  retention-days: 7

    # Docker images are built and pushed by docker-publish.yml for semver release
    # tags matching v*.*.*. That workflow additionally handles Docker Hub, cosign
    # signing, the Cloudflare Containers image (Dockerfile.container), and daily
    # security rebuilds. The build-docker job was removed from this workflow to
    # prevent double-pushes to GHCR on release tags.
    # Note: release.yml also fires on non-semver v* tags (e.g. v1, v1.2) for binary
    # builds. Docker images are only published for full semver v*.*.* tags because
    # docker-publish.yml uses a stricter 'v*.*.*' path filter.

    create-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [build-binaries]
        if: needs.build-binaries.result == 'success'
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Get version
              id: version
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                    echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                  else
                    TAG="${GITHUB_REF#refs/tags/}"
                    # Strip tag prefix: handles both 'v1.2.3' and 'compiler-v1.2.3'
                    VERSION="${TAG#compiler-v}"
                    VERSION="${VERSION#v}"
                    echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                    echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  fi

            - name: Download all artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts
                  pattern: adblock-compiler-*

            - name: Prepare release assets
              run: |
                  set -euo pipefail
                  mkdir -p release
                  for dir in artifacts/*/; do
                    for file in "$dir"*.tar.gz "$dir"*.zip; do
                      [ -f "$file" ] && cp "$file" "release/$(basename "$file")"
                    done
                  done
                  ls -lah release/

            - name: Generate release notes
              id: notes
              run: |
                  set -euo pipefail
                  cat << 'EOF' > release-notes.md
                  ## What's Changed

                  See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for detailed changes.

                  ## Installation

                  ### JSR (Deno)
                  ```bash
                  deno add @jk-com/adblock-compiler
                  ```

                  ### Docker
                  ```bash
                  docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                  ```

                  ### Binary Downloads
                  Download the appropriate binary for your platform from the assets below.

                  | Platform | Architecture | Download |
                  |----------|--------------|----------|
                  | Linux | x64 | `adblock-compiler-linux-x64.tar.gz` |
                  | Linux | ARM64 | `adblock-compiler-linux-arm64.tar.gz` |
                  | macOS | x64 (Intel) | `adblock-compiler-macos-x64.tar.gz` |
                  | macOS | ARM64 (Apple Silicon) | `adblock-compiler-macos-arm64.tar.gz` |
                  | Windows | x64 | `adblock-compiler-windows-x64.exe.zip` |

                  ### Extracting

                  **Linux/macOS:** `tar -xzf adblock-compiler-<platform>.tar.gz`
                  **Windows:** Extract the `.zip` file using File Explorer or `Expand-Archive` in PowerShell.

                  ## Checksums
                  ```
                  EOF
                  cd release
                  if [ -n "$(ls -A 2>/dev/null)" ]; then
                      sha256sum ./* >> ../release-notes.md 2>/dev/null || shasum -a 256 ./* >> ../release-notes.md
                  else
                      echo 'No binary artifacts were generated; no checksums available.' >> ../release-notes.md
                  fi
                  echo '```' >> ../release-notes.md

            - name: Create tag (workflow_dispatch only)
              if: github.event_name == 'workflow_dispatch'
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git fetch --tags
                  TAG_NAME="${{ steps.version.outputs.tag }}"
                  VERSION="${{ steps.version.outputs.version }}"
                  if [ -n "$(git tag -l \"$TAG_NAME\")" ]; then
                    echo "Tag $TAG_NAME already exists locally, skipping creation."
                  else
                    echo "Creating new tag $TAG_NAME for version $VERSION."
                    git tag -a "$TAG_NAME" -m "Release $VERSION"
                  fi
                  if git ls-remote --exit-code --tags origin "$TAG_NAME" >/dev/null 2>&1; then
                    echo "Tag $TAG_NAME already exists on origin, skipping push."
                  else
                    echo "Pushing tag $TAG_NAME to origin."
                    git push origin "$TAG_NAME"
                  fi

            - name: Create GitHub Release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 (v2 tag resolves to 3bb12739c298aeb8a4eeaf626c5b8d85266b0e65)
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  name: v${{ steps.version.outputs.version }}
                  body_path: release-notes.md
                  files: release/*
                  draft: false
                  prerelease: ${{ contains(steps.version.outputs.version, '-') }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
