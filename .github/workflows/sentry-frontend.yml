name: Sentry Source Maps (Frontend)

on:
    push:
        branches: [main]
        paths:
            - 'frontend/**'
            - 'pnpm-lock.yaml'
        tags: ['v*']
    workflow_dispatch:

jobs:
    upload-sourcemaps:
        name: Upload Frontend Source Maps to Sentry
        runs-on: ubuntu-latest
        permissions:
            contents: read
        if: ${{ vars.SENTRY_ORG != '' }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.15'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Angular frontend (with source maps)
              run: pnpm --filter adblock-frontend run build -- --source-map=true
              env:
                  NODE_ENV: production

            - name: Upload source maps to Sentry
              working-directory: frontend
              run: |
                  npx @sentry/cli sourcemaps upload \
                    --org "${{ vars.SENTRY_ORG }}" \
                    --project "${{ vars.SENTRY_PROJECT }}" \
                    --release "${{ github.sha }}" \
                    --url-prefix "~/" \
                    ./dist/adblock-compiler/browser
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    upload-frontend-ssr:
        name: Upload Frontend SSR Source Maps to Sentry
        runs-on: ubuntu-latest
        continue-on-error: true
        permissions:
            contents: read
        if: ${{ vars.SENTRY_ORG != '' }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24.15'
                  cache: 'pnpm'

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile --filter adblock-frontend

            - name: Build Angular frontend SSR bundle (with source maps)
              run: pnpm --filter adblock-frontend run build -- --source-map=true
              env:
                  NODE_ENV: production
                  CF_WEB_ANALYTICS_TOKEN: ''

            - name: Upload frontend SSR source maps to Sentry
              working-directory: frontend
              run: |
                  npx @sentry/cli sourcemaps upload \
                    --org "${{ vars.SENTRY_ORG }}" \
                    --project "${{ vars.SENTRY_FRONTEND_PROJECT != '' && vars.SENTRY_FRONTEND_PROJECT || vars.SENTRY_PROJECT }}" \
                    --release "${{ github.sha }}" \
                    ./dist/adblock-compiler/server
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
