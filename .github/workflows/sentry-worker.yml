name: Sentry Source Maps (Worker)

on:
    push:
        branches: [main]
        paths:
            - 'worker/**'
            - 'src/**'
            - 'wrangler.toml'
        tags:
            - 'compiler-v*'
            - 'v*'
    workflow_dispatch:

jobs:
    upload-worker:
        name: Upload Worker Source Maps to Sentry
        runs-on: ubuntu-latest
        permissions:
            contents: read
        if: ${{ vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT_WORKER != '' }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno
              uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
              with:
                  deno-version: v2.x

            - name: Build Worker bundle (dry-run for source maps)
              run: deno run --allow-read --allow-net --allow-env --allow-run --allow-write=dist/worker npm:wrangler deploy --dry-run --outdir dist/worker

            - name: Upload Worker source maps to Sentry
              run: |
                  npx @sentry/cli sourcemaps upload \
                    --org "${{ vars.SENTRY_ORG }}" \
                    --project "${{ vars.SENTRY_PROJECT_WORKER }}" \
                    --release "${{ github.sha }}" \
                    ./dist/worker
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
