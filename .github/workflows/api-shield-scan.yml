name: API Shield Readiness

# Validates that the OpenAPI specification is compatible with Cloudflare's
# API Shield Vulnerability Scanner. This workflow ensures:
#   1. The spec validates cleanly (deno task openapi:validate)
#   2. All operations have an operationId (required for scanner call graphs)
#   3. Resource endpoints carry security annotations
#   4. The cloudflare-schema.yaml is not drifting from openapi.yaml
#
# Reference: https://blog.cloudflare.com/vulnerability-scanner/
# Setup guide: docs/security/API_SHIELD_VULNERABILITY_SCANNER.md

on:
    push:
        branches: [main]
        paths:
            - 'docs/api/openapi.yaml'
            - 'docs/api/cloudflare-schema.yaml'
            - 'scripts/generate-cloudflare-schema.ts'
            - 'scripts/validate-openapi.ts'
    pull_request:
        branches: [main]
        paths:
            - 'docs/api/openapi.yaml'
            - 'docs/api/cloudflare-schema.yaml'
            - 'scripts/generate-cloudflare-schema.ts'
            - 'scripts/validate-openapi.ts'
    workflow_dispatch:

concurrency:
    group: api-shield-${{ github.ref }}
    cancel-in-progress: true

jobs:
    api-shield-readiness:
        name: API Shield Readiness Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: '2.x'
                  install-deps: 'false'

            # ----------------------------------------------------------------
            # 1. Validate the OpenAPI spec
            # ----------------------------------------------------------------
            - name: Validate OpenAPI specification
              run: deno task openapi:validate

            # ----------------------------------------------------------------
            # 2. Check all operations have operationId
            #    The scanner uses operationId to build API call graphs.
            #    Operations without an ID cannot be referenced in scan sequences.
            # ----------------------------------------------------------------
            - name: Check operationId coverage
              run: |
                  echo "=== Checking operationId coverage ==="

                  # Count HTTP method blocks vs operationId occurrences
                  METHOD_COUNT=$(grep -cE '^\s+(get|post|put|patch|delete):\s*$' docs/api/openapi.yaml || true)
                  OPID_COUNT=$(grep -c 'operationId:' docs/api/openapi.yaml || true)

                  echo "HTTP methods defined: $METHOD_COUNT"
                  echo "operationId entries:  $OPID_COUNT"

                  if [ "$OPID_COUNT" -lt "$METHOD_COUNT" ]; then
                    echo ""
                    echo "::error::operationId missing on $((METHOD_COUNT - OPID_COUNT)) operation(s)."
                    echo "Every operation needs a unique operationId for the API Shield scanner call graphs."
                    echo "Run: grep -n 'get:\|post:\|put:\|patch:\|delete:' docs/api/openapi.yaml | head -50"
                    exit 1
                  fi
                  echo "✅ All $OPID_COUNT operations have an operationId"

            # ----------------------------------------------------------------
            # 3. Check resource endpoints have security annotations
            #    Resource endpoints (those with path parameters like /{id})
            #    must declare a security requirement so the scanner knows
            #    which auth scheme to test with.
            # ----------------------------------------------------------------
            - name: Check security annotations on resource endpoints
              run: |
                  echo "=== Checking security annotations on resource endpoints ==="

                  VIOLATIONS=0
                  CURRENT_PATH=""
                  CURRENT_METHOD=""
                  HAS_PARAM=false
                  HAS_SECURITY=false
                  LINE_NUM=0

                  while IFS= read -r line; do
                    LINE_NUM=$((LINE_NUM + 1))

                    # Detect path entries (lines like "    /path/{id}:")
                    if echo "$line" | grep -qE '^\s{4}/.*\{[^}]+\}.*:$'; then
                      CURRENT_PATH=$(echo "$line" | tr -d ' :')
                      HAS_PARAM=true
                      CURRENT_METHOD=""
                      HAS_SECURITY=false
                    fi

                    # Detect HTTP methods under a path
                    if echo "$line" | grep -qE '^\s{8}(get|post|put|patch|delete):\s*$'; then
                      # If we had a previous method+path combo with no security, flag it
                      if [ -n "$CURRENT_METHOD" ] && [ "$HAS_PARAM" = "true" ] && [ "$HAS_SECURITY" = "false" ]; then
                        # Only flag if it's not an admin endpoint (those use AdminKey implicitly)
                        if ! echo "$CURRENT_PATH" | grep -q '/admin/'; then
                          echo "⚠️  Resource endpoint missing security annotation: $CURRENT_PATH ($CURRENT_METHOD)"
                          VIOLATIONS=$((VIOLATIONS + 1))
                        fi
                      fi
                      CURRENT_METHOD=$(echo "$line" | tr -d ' :')
                      HAS_SECURITY=false
                    fi

                    # Detect security annotations
                    if echo "$line" | grep -qE '^\s+security:\s*$'; then
                      HAS_SECURITY=true
                    fi

                    # When we leave a path block, check the last method
                    if echo "$line" | grep -qE '^\s{4}/'; then
                      if [ -n "$CURRENT_METHOD" ] && [ "$HAS_PARAM" = "true" ] && [ "$HAS_SECURITY" = "false" ]; then
                        if ! echo "$CURRENT_PATH" | grep -q '/admin/'; then
                          echo "⚠️  Resource endpoint missing security annotation: $CURRENT_PATH ($CURRENT_METHOD)"
                          VIOLATIONS=$((VIOLATIONS + 1))
                        fi
                      fi
                      HAS_PARAM=false
                    fi
                  done < docs/api/openapi.yaml

                  if [ "$VIOLATIONS" -gt 0 ]; then
                    echo ""
                    echo "::warning::$VIOLATIONS resource endpoint(s) are missing 'security:' annotations."
                    echo "Add security requirements so the API Shield scanner knows which auth scheme to use."
                    echo "See docs/security/API_SHIELD_VULNERABILITY_SCANNER.md for guidance."
                    # Warn only — do not fail, as missing annotations don't break functionality
                  else
                    echo "✅ All resource endpoints have security annotations"
                  fi

            # ----------------------------------------------------------------
            # 4. Check cloudflare-schema.yaml is not drifting from openapi.yaml
            #    Regenerate the schema and fail if it differs from committed.
            # ----------------------------------------------------------------
            - name: Check Cloudflare schema is up to date
              run: |
                  echo "=== Checking cloudflare-schema.yaml is up to date ==="

                  # Save the current committed schema checksum
                  BEFORE=$(sha256sum docs/api/cloudflare-schema.yaml | awk '{print $1}')

                  # Regenerate
                  deno task schema:cloudflare

                  AFTER=$(sha256sum docs/api/cloudflare-schema.yaml | awk '{print $1}')

                  if [ "$BEFORE" != "$AFTER" ]; then
                    echo ""
                    echo "::error::docs/api/cloudflare-schema.yaml is out of date."
                    echo "Run 'deno task schema:cloudflare' and commit the result before merging."
                    echo "This schema is uploaded to Cloudflare API Shield and must stay in sync with openapi.yaml."
                    git diff docs/api/cloudflare-schema.yaml
                    exit 1
                  fi
                  echo "✅ cloudflare-schema.yaml matches openapi.yaml"

            # ----------------------------------------------------------------
            # 5. Summary
            # ----------------------------------------------------------------
            - name: API Shield readiness summary
              if: success()
              run: |
                  echo ""
                  echo "=================================================="
                  echo "  ✅  API Shield readiness checks passed"
                  echo "=================================================="
                  echo ""
                  echo "Next steps to activate the vulnerability scanner:"
                  echo "  1. Upload docs/api/cloudflare-schema.yaml to API Shield"
                  echo "  2. Configure test credentials in HashiCorp Vault"
                  echo "  3. Enable scanner in Cloudflare Dashboard → Security → API Shield"
                  echo ""
                  echo "See docs/security/API_SHIELD_VULNERABILITY_SCANNER.md for full setup guide."
