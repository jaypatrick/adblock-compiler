name: Build & Deploy Docusaurus Docs

on:
    push:
        branches: [main]
        paths:
            - 'docs/**'
            - 'docs-docusaurus/**'
            - '.github/workflows/docs-docusaurus.yml'
    workflow_dispatch:

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Set up pnpm
              uses: pnpm/action-setup@fe02b74ab2366585755b9c0ba3b23f86dce4b1be # v4.0.0
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
              with:
                  node-version: '20'
                  cache: 'pnpm'
                  cache-dependency-path: 'docs-docusaurus/package.json'

            - name: Install Docusaurus dependencies
              run: pnpm --filter @bloqr/docs-docusaurus install --frozen-lockfile

            - name: Build Docusaurus site
              run: pnpm --filter @bloqr/docs-docusaurus run build

            - name: Deploy to Cloudflare Workers
              run: |
                  set -euo pipefail
                  echo "Deploying Docusaurus docs to Cloudflare Workers..."
                  npx wrangler@4.83.0 deploy --config docs-docusaurus/wrangler.docs-docusaurus.toml
                  echo "✅ Docusaurus docs deployed successfully"
