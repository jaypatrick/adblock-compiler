name: Build & Deploy mdBook

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - 'scripts/mdbook-last-updated.ts'
      - 'scripts/generate-docs.ts'
      - 'scripts/generate-cloudflare-schema.ts'
      - 'scripts/generate-postman-collection.ts'
      - '.github/workflows/mdbook.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_PAGES_PROJECT: adblock-docs

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.5.2
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook.tar.gz
          tar xzf mdbook.tar.gz
          sudo mv mdbook /usr/local/bin/
          rm mdbook.tar.gz

          MERMAID_VERSION=0.17.0
          curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook-mermaid.tar.gz
          mkdir -p /tmp/mdbook-mermaid-install
          tar xzf mdbook-mermaid.tar.gz -C /tmp/mdbook-mermaid-install
          MERMAID_BIN=$(find /tmp/mdbook-mermaid-install -type f -name "mdbook-mermaid" -print -quit)
          if [ -z "$MERMAID_BIN" ]; then
            echo "Error: mdbook-mermaid binary not found in extracted archive" >&2
            exit 1
          fi
          sudo mv "$MERMAID_BIN" /usr/local/bin/
          rm -rf mdbook-mermaid.tar.gz /tmp/mdbook-mermaid-install

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-docs-${{ runner.os }}-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            deno-docs-${{ runner.os }}-
            deno-${{ runner.os }}-

      - name: Regenerate OpenAPI documentation
        run: |
          deno task openapi:docs
          deno task schema:cloudflare
          deno task postman:collection

      - name: Build mdBook
        run: |
          set -euo pipefail
          mdbook build

      - name: Generate TypeScript API reference
        continue-on-error: true
        run: deno task docs:api

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          # shellcheck source=.github/scripts/retry.sh
          source .github/scripts/retry.sh
          echo "Deploying documentation to Cloudflare Pages..."
          # --commit-dirty=true: required because regenerated OpenAPI/Postman docs modify
          # in-tree files (docs/api/, docs/postman/) before this step runs.
          # --config wrangler.pages.toml: use the Pages-specific config to avoid wrangler
          # picking up root wrangler.toml (Workers config, lacks pages_build_output_dir).
          # pages_build_output_dir="book" is declared in wrangler.pages.toml.
          # Retry with 30s initial delay (3 total attempts; sleeps: 30s → 60s).
          retry_command 3 30 deno task wrangler pages deploy \
            --config wrangler.pages.toml \
            --project-name="${{ env.CLOUDFLARE_PAGES_PROJECT }}" \
            --branch=main \
            --commit-dirty=true
          echo "✅ Documentation deployed successfully"
