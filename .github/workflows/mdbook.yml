name: Build & Deploy mdBook

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - 'scripts/mdbook-last-updated.ts'
      - 'scripts/generate-docs.ts'
      - 'scripts/generate-cloudflare-schema.ts'
      - 'scripts/generate-postman-collection.ts'
      - '.github/workflows/mdbook.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_PAGES_PROJECT: adblock-compiler-docs

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.5.2
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook.tar.gz
          tar xzf mdbook.tar.gz
          sudo mv mdbook /usr/local/bin/
          rm mdbook.tar.gz

          MERMAID_VERSION=0.17.0
          curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook-mermaid.tar.gz
          mkdir -p /tmp/mdbook-mermaid-install
          tar xzf mdbook-mermaid.tar.gz -C /tmp/mdbook-mermaid-install
          MERMAID_BIN=$(find /tmp/mdbook-mermaid-install -type f -name "mdbook-mermaid" -print -quit)
          if [ -z "$MERMAID_BIN" ]; then
            echo "Error: mdbook-mermaid binary not found in extracted archive" >&2
            exit 1
          fi
          sudo mv "$MERMAID_BIN" /usr/local/bin/
          rm -rf mdbook-mermaid.tar.gz /tmp/mdbook-mermaid-install

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-docs-${{ runner.os }}-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            deno-docs-${{ runner.os }}-
            deno-${{ runner.os }}-

      - name: Regenerate OpenAPI documentation
        run: |
          deno task openapi:docs
          deno task schema:cloudflare
          deno task postman:collection

      - name: Build mdBook
        run: |
          set -euo pipefail
          mdbook build

      - name: Generate TypeScript API reference
        continue-on-error: true
        run: deno task docs:api

      - name: Create Pages project if needed
        run: |
          set -euo pipefail
          # shellcheck source=.github/scripts/retry.sh
          source .github/scripts/retry.sh

          echo "Checking if Pages project exists..."

          # List existing projects with better error handling
          if ! PROJECT_LIST=$(retry_command 3 15 deno task wrangler pages project list 2>&1); then
            echo "❌ ERROR: Failed to list Pages projects after 3 attempts"
            echo "This is required to determine if the project needs to be created."
            echo "Please check your CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

          echo "Available Pages projects:"
          echo "$PROJECT_LIST"
          echo ""

          # Check if project exists
          if echo "$PROJECT_LIST" | grep -q "${{ env.CLOUDFLARE_PAGES_PROJECT }}"; then
            echo "✅ Pages project '${{ env.CLOUDFLARE_PAGES_PROJECT }}' already exists"
          else
            echo "📦 Creating Pages project: ${{ env.CLOUDFLARE_PAGES_PROJECT }}"
            echo "⚠️  NOTE: This may fail if the project already exists in the account but is not visible to this API token"
            echo "⚠️  If creation fails repeatedly, create the project manually at: https://dash.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages"

            # Try to create the project - capture both stdout and stderr
            CREATE_OUTPUT=$(deno task wrangler pages project create "${{ env.CLOUDFLARE_PAGES_PROJECT }}" --production-branch main 2>&1 || true)
            CREATE_EXIT_CODE=$?

            echo "Create command output:"
            echo "$CREATE_OUTPUT"
            echo "Exit code: $CREATE_EXIT_CODE"

            # Wait for API propagation
            echo "Waiting 10 seconds for API propagation..."
            sleep 10

            # Verify the project exists after creation attempt
            echo "Verifying project exists..."
            VERIFY_ATTEMPTS=0
            MAX_VERIFY_ATTEMPTS=5
            PROJECT_EXISTS=false

            while [ $VERIFY_ATTEMPTS -lt $MAX_VERIFY_ATTEMPTS ]; do
              VERIFY_ATTEMPTS=$((VERIFY_ATTEMPTS + 1))
              echo "Verification attempt $VERIFY_ATTEMPTS/$MAX_VERIFY_ATTEMPTS..."

              if VERIFY_LIST=$(deno task wrangler pages project list 2>&1); then
                echo "Current project list:"
                echo "$VERIFY_LIST"

                if echo "$VERIFY_LIST" | grep -q "${{ env.CLOUDFLARE_PAGES_PROJECT }}"; then
                  echo "✅ Project verified: '${{ env.CLOUDFLARE_PAGES_PROJECT }}' exists"
                  PROJECT_EXISTS=true
                  break
                else
                  echo "⚠️  Project not found in list yet..."
                fi
              else
                echo "⚠️  Failed to list projects during verification"
              fi

              if [ $VERIFY_ATTEMPTS -lt $MAX_VERIFY_ATTEMPTS ]; then
                echo "Waiting 5 seconds before retry..."
                sleep 5
              fi
            done

            if [ "$PROJECT_EXISTS" = false ]; then
              echo ""
              echo "❌ ERROR: Project '${{ env.CLOUDFLARE_PAGES_PROJECT }}' does not exist after creation attempt"
              echo ""
              echo "TROUBLESHOOTING:"
              echo "1. Verify CLOUDFLARE_API_TOKEN has 'Cloudflare Pages:Edit' permission"
              echo "2. Check if the project exists in the dashboard: https://dash.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages"
              echo "3. If it exists in the dashboard but not visible to this token, update token permissions"
              echo "4. If it doesn't exist, try creating it manually with the same name: ${{ env.CLOUDFLARE_PAGES_PROJECT }}"
              echo "5. Check CLOUDFLARE_ACCOUNT_ID is correct: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
              exit 1
            fi
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          # shellcheck source=.github/scripts/retry.sh
          source .github/scripts/retry.sh
          echo "Deploying documentation to Cloudflare Pages..."

          # Verify project exists one more time before deployment
          echo "Final check: Verifying project exists..."
          if ! PROJECT_CHECK=$(deno task wrangler pages project list 2>&1) || ! echo "$PROJECT_CHECK" | grep -q "${{ env.CLOUDFLARE_PAGES_PROJECT }}"; then
            echo "❌ ERROR: Project '${{ env.CLOUDFLARE_PAGES_PROJECT }}' not found before deployment"
            echo "Available projects:"
            deno task wrangler pages project list || true
            echo ""
            echo "TROUBLESHOOTING:"
            echo "1. Check if CLOUDFLARE_API_TOKEN has 'Cloudflare Pages:Edit' permission"
            echo "2. Verify CLOUDFLARE_ACCOUNT_ID is correct"
            echo "3. Try creating the project manually at: https://dash.cloudflare.com/pages"
            exit 1
          fi

          # --commit-dirty=true: required because regenerated OpenAPI/Postman docs modify
          # in-tree files (docs/api/, docs/postman/) before this step runs.
          retry_command 3 15 deno task wrangler pages deploy book \
            --project-name="${{ env.CLOUDFLARE_PAGES_PROJECT }}" \
            --branch=main \
            --commit-dirty=true
          echo "✅ Documentation deployed successfully"
