name: Create Version Tag

on:
    pull_request:
        types: [closed]
        branches:
            - main

permissions:
    contents: write

jobs:
    create-tag:
        name: Create Version Tag
        runs-on: ubuntu-latest
        # Only run if PR was merged and the branch name starts with "auto-version-bump-"
        if: |
            github.event.pull_request.merged == true &&
            startsWith(github.event.pull_request.head.ref, 'auto-version-bump-')
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  ref: main

            - name: Setup Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
              with:
                  deno-version: '2.x'

            - name: Detect tag prefix
              id: detect_prefix
              env:
                  PR_BODY: ${{ github.event.pull_request.body }}
              run: |
                  if echo "$PR_BODY" | grep -qiE "compiler version bump|compiler-only"; then
                    TAG_PREFIX="compiler-v"
                  else
                    TAG_PREFIX="v"
                  fi
                  echo "tag_prefix=$TAG_PREFIX" >> "$GITHUB_OUTPUT"

            - name: Get version from deno.json
              id: get_version
              env:
                  TAG_PREFIX: ${{ steps.detect_prefix.outputs.tag_prefix }}
              run: |
                  VERSION=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG_PREFIX}${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION"
                  echo "Tag: ${TAG_PREFIX}${VERSION}"

            - name: Check if tag exists
              id: check_tag
              env:
                  TAG: ${{ steps.get_version.outputs.tag }}
              run: |
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG already exists"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG does not exist"
                  fi

            - name: Create and push tag
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  TAG_NAME: ${{ steps.get_version.outputs.tag }}
                  VERSION: ${{ steps.get_version.outputs.version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git tag -a "$TAG_NAME" -m "Release $VERSION"
                  git push origin "$TAG_NAME"

                  echo "Created and pushed tag $TAG_NAME"

            - name: Delete version bump branch
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
              run: |
                  git push origin --delete "$BRANCH_NAME" || echo "Branch already deleted"
                  echo "Deleted branch $BRANCH_NAME"

            - name: Summary
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  TAG_PREFIX: ${{ steps.detect_prefix.outputs.tag_prefix }}
                  VERSION: ${{ steps.get_version.outputs.version }}
                  TAG: ${{ steps.get_version.outputs.tag }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  if [ "$TAG_PREFIX" = "compiler-v" ]; then
                    TITLE="🏷️ Compiler Version Tag Created"
                  else
                    TITLE="🏷️ Version Tag Created"
                  fi
                  cat <<EOF >> $GITHUB_STEP_SUMMARY
                  ## $TITLE

                  - **Version**: $VERSION
                  - **Tag**: $TAG
                  - **PR**: #$PR_NUMBER

                  The release workflow will be automatically triggered by the new tag.
                  EOF

            - name: Skip summary
              if: steps.check_tag.outputs.exists == 'true'
              env:
                  TAG: ${{ steps.get_version.outputs.tag }}
              run: |
                  cat <<EOF >> $GITHUB_STEP_SUMMARY
                  ## ℹ️ Tag Already Exists

                  Tag $TAG already exists. Skipping tag creation.
                  EOF
