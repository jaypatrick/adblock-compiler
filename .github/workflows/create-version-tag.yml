name: Create Version Tag

on:
    pull_request:
        types: [closed]
        branches:
            - main
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to tag (e.g. 1.2.3). Leave empty to read from deno.json.'
                required: false
                type: string

permissions:
    contents: write

jobs:
    create-tag:
        name: Create Version Tag
        runs-on: ubuntu-latest
        # Run when:
        #   • a version-bump PR is merged (branch name matches any version-bump pattern), OR
        #   • triggered manually via workflow_dispatch.
        # Accepted branch name patterns (case-sensitive):
        #   - auto-version-bump-*   (canonical pattern used by version-bump.yml)
        #   - chore/version-bump-*  (alternative conventional-commits style)
        #   - *version-bump*        (catch-all for re-runs / renamed branches)
        if: |
            github.event_name == 'workflow_dispatch' || (
                github.event.pull_request.merged == true && (
                    startsWith(github.event.pull_request.head.ref, 'auto-version-bump-') ||
                    startsWith(github.event.pull_request.head.ref, 'chore/version-bump-') ||
                    contains(github.event.pull_request.head.ref, 'version-bump')
                )
            )
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  ref: main

            - name: Setup Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: '2.x'

            - name: Detect tag prefix
              id: detect_prefix
              env:
                  PR_BODY: ${{ github.event.pull_request.body }}
              run: |
                  if echo "$PR_BODY" | grep -qiE "compiler version bump|compiler-only"; then
                    TAG_PREFIX="compiler-v"
                  else
                    TAG_PREFIX="v"
                  fi
                  echo "tag_prefix=$TAG_PREFIX" >> "$GITHUB_OUTPUT"

            - name: Get version from deno.json
              id: get_version
              env:
                  TAG_PREFIX: ${{ steps.detect_prefix.outputs.tag_prefix }}
                  MANUAL_VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  if [ -n "${MANUAL_VERSION}" ]; then
                    # Validate that the manually supplied version is a valid semver (X.Y.Z)
                    if ! echo "${MANUAL_VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                      echo "::error::Invalid version format '${MANUAL_VERSION}'. Expected X.Y.Z (e.g. 1.2.3)."
                      exit 1
                    fi
                    VERSION="${MANUAL_VERSION}"
                  else
                    VERSION=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
                  fi
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG_PREFIX}${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION"
                  echo "Tag: ${TAG_PREFIX}${VERSION}"

            - name: Check if tag exists
              id: check_tag
              env:
                  TAG: ${{ steps.get_version.outputs.tag }}
              run: |
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG already exists"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG does not exist"
                  fi

            - name: Create and push tag
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  TAG_NAME: ${{ steps.get_version.outputs.tag }}
                  VERSION: ${{ steps.get_version.outputs.version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git tag -a "$TAG_NAME" -m "Release $VERSION"
                  git push origin "$TAG_NAME"

                  echo "Created and pushed tag $TAG_NAME"

            - name: Delete version bump branch
              if: steps.check_tag.outputs.exists == 'false' && github.event_name == 'pull_request'
              env:
                  BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
              run: |
                  git push origin --delete "$BRANCH_NAME" || echo "Branch already deleted"
                  echo "Deleted branch $BRANCH_NAME"

            - name: Summary
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  TAG_PREFIX: ${{ steps.detect_prefix.outputs.tag_prefix }}
                  VERSION: ${{ steps.get_version.outputs.version }}
                  TAG: ${{ steps.get_version.outputs.tag }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  EVENT_NAME: ${{ github.event_name }}
              run: |
                  if [ "$TAG_PREFIX" = "compiler-v" ]; then
                    TITLE="🏷️ Compiler Version Tag Created"
                  else
                    TITLE="🏷️ Version Tag Created"
                  fi
                  if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
                    TRIGGER_LINE="- **PR**: #${PR_NUMBER}"
                  else
                    TRIGGER_LINE="- **Triggered**: manual workflow_dispatch"
                  fi
                  cat <<EOF >> $GITHUB_STEP_SUMMARY
                  ## $TITLE

                  - **Version**: $VERSION
                  - **Tag**: $TAG
                  $TRIGGER_LINE

                  The release workflow will be automatically triggered by the new tag.
                  EOF

            - name: Skip summary
              if: steps.check_tag.outputs.exists == 'true'
              env:
                  TAG: ${{ steps.get_version.outputs.tag }}
              run: |
                  cat <<EOF >> $GITHUB_STEP_SUMMARY
                  ## ℹ️ Tag Already Exists

                  Tag $TAG already exists. Skipping tag creation.
                  EOF

    # Runs only on pull_request.closed when the branch name did NOT match any
    # version-bump pattern, making the skip visible in the Actions UI instead of
    # silently doing nothing.
    notify-skipped:
        name: Notify Skipped (branch mismatch)
        runs-on: ubuntu-latest
        if: |
            github.event_name == 'pull_request' &&
            github.event.pull_request.merged == true && !(
                startsWith(github.event.pull_request.head.ref, 'auto-version-bump-') ||
                startsWith(github.event.pull_request.head.ref, 'chore/version-bump-') ||
                contains(github.event.pull_request.head.ref, 'version-bump')
            )
        steps:
            - name: Write skip notice to job summary
              env:
                  BRANCH: ${{ github.event.pull_request.head.ref }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  cat <<EOF >> "$GITHUB_STEP_SUMMARY"
                  ## ⚠️ Create-Version-Tag Skipped

                  PR #${PR_NUMBER} was merged but branch **\`${BRANCH}\`** does not match
                  any version-bump pattern (\`auto-version-bump-*\`, \`chore/version-bump-*\`,
                  or \`*version-bump*\`), so no tag was created.

                  If a version tag is needed, trigger this workflow manually via
                  **Actions → Create Version Tag → Run workflow** and supply the version number.
                  EOF
                  echo "::warning::create-version-tag skipped — branch '${BRANCH}' did not match a version-bump pattern (PR #${PR_NUMBER})"
