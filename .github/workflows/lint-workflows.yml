name: Lint Workflows

on:
    push:
        paths:
            - '.github/workflows/**'
            - '.github/actions/**'
    pull_request:
        paths:
            - '.github/workflows/**'
            - '.github/actions/**'

jobs:
    lint-workflows:
        name: Lint Workflows
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: '3.11'

            - name: Install yamllint
              run: python -m pip install yamllint==1.35.1

            - name: Lint YAML structure
              run: |
                  yamllint \
                    -d "{extends: relaxed, rules: {line-length: {max: 240}, trailing-spaces: enable, new-line-at-end-of-file: enable, empty-lines: {max: 2}}}" \
                    .github/workflows/ \
                    .github/actions/

            - name: Lint workflow logic (actionlint)
              uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11
              with:
                  args: >-
                      -ignore SC2086
                      -ignore SC2016
                      -ignore SC2129
                      -ignore SC2088
                      -ignore "string should not be empty"
                      -ignore "unknown permission scope"
