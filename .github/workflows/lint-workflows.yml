name: Lint Workflows

on:
    push:
        paths:
            - '.github/workflows/**'
            - '.github/actions/**'
    pull_request:
        paths:
            - '.github/workflows/**'
            - '.github/actions/**'

jobs:
    lint-workflows:
        name: Lint Workflows
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install yamllint
              run: pip install yamllint

            - name: Lint YAML structure
              run: >-
                  yamllint -d "{extends: relaxed, rules: {line-length: {max: 240},
                  trailing-spaces: enable, new-line-at-end-of-file: enable,
                  empty-lines: {max: 2}}}"
                  .github/workflows/
                  .github/actions/

            - name: Lint workflow logic (actionlint)
              uses: rhysd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106 # v1.7.7
              with:
                  args: >-
                      -ignore SC2086
                      -ignore SC2016
                      -ignore SC2129
                      -ignore SC2088
                      -ignore "string should not be empty"
                      -ignore "unknown permission scope"
