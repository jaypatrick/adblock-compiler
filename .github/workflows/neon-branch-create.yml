# Neon Database Branch — Create
#
# Creates an isolated Neon PostgreSQL branch for pull requests that touch
# Neon-relevant files (schema, migrations, Prisma config, auth/DB middleware).
# The branch is named `pr-<number>` and is automatically deleted by
# neon-branch-cleanup.yml when the PR is closed or merged.
#
# Path-gating: the `pull_request` trigger uses a `paths` filter so this
# workflow is skipped entirely for PRs that only touch frontend code, docs,
# workflow files, etc.  This prevents unnecessary billable Neon branches.
# The `workflow_dispatch` trigger has no `paths` filter so a branch can
# always be created manually for a PR that needs one.
#
# Phase 0 of the Neon PostgreSQL migration.
#
# Required repository secrets:
#   NEON_API_KEY                – Neon API token (Settings → API Keys in the Neon console)
#   NEON_PROJECT_ID             – Neon project ID (e.g. twilight-river-73901472)
#   NEON_DATABASE_URL           – Connection string for the *staging* Neon branch.
#                                 This corresponds to the branch that acts as the parent for new PR branches,
#                                 but the parent branch itself is configured explicitly in this workflow (e.g. `parent: staging`).
#                                 Format: postgresql://ROLE:PASSWORD@HOST/DATABASE?sslmode=require
#                                 The database name and role are derived from this URL at
#                                 runtime — do NOT hardcode them in this file.
#
# NOTE — Why no Hyperdrive?
#   Hyperdrive is a Cloudflare edge service.  It is only accessible from code
#   running inside a Cloudflare Worker — GitHub Actions runners are standard
#   Linux VMs that live outside Cloudflare's network and cannot reach it.
#   Prisma migrations therefore connect directly to Neon via DIRECT_DATABASE_URL.
#   The deployed Worker uses env.HYPERDRIVE.connectionString for all queries.

name: 'Neon Branch: Create'

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'prisma/**'
      - 'prisma.config.ts'
      - 'worker/lib/auth.ts'
      - 'worker/lib/prisma.ts'
      - 'worker/middleware/better-auth-provider.ts'
      - 'worker/middleware/prisma-middleware.ts'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to create a Neon branch for (produces branch name pr-<N>)'
        required: false
        type: string
      branch_name:
        description: 'Custom Neon branch name (overrides pr_number; use for branches not tied to a PR)'
        required: false
        type: string

# Only one branch-create job per PR at a time; cancel stale runs when a
# new commit is pushed.  For manual dispatches without a PR number, use
# the run ID so each dispatch gets its own concurrency slot.
concurrency:
  group: neon-branch-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write          # Needed to post the PR comment

jobs:
  check-prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check required secrets
        id: check
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          if [ -z "$NEON_DATABASE_URL" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NEON_DATABASE_URL is not configured. Skipping Neon branch creation."
            echo "::warning::Add NEON_DATABASE_URL, NEON_API_KEY, and NEON_PROJECT_ID in repository Settings → Secrets and Variables → Actions."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  create-neon-branch:
    name: Create Neon Branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [check-prerequisites]
    if: needs.check-prerequisites.outputs.ready == 'true'

    steps:
      # ── 0. Resolve branch name and PR number from trigger context ──────────
      # pull_request:    branch_name = pr-<N>,   pr_number = <N>
      # workflow_dispatch with pr_number:   branch_name = pr-<N>,   pr_number = <N>
      # workflow_dispatch with branch_name: branch_name = <custom>, pr_number = (empty)
      - name: Resolve branch context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "branch_name=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${PR_NUMBER}"       >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_PR_NUMBER" ]; then
            echo "branch_name=pr-${INPUT_PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${INPUT_PR_NUMBER}"       >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_BRANCH_NAME" ]; then
            echo "branch_name=${INPUT_BRANCH_NAME}" >> "$GITHUB_OUTPUT"
            echo "pr_number="                        >> "$GITHUB_OUTPUT"
          else
            echo "::error::No branch context could be resolved for workflow_dispatch. Provide either pr_number or branch_name input."
            exit 1
          fi

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # ── 2. Resolve database config from NEON_DATABASE_URL ─────────────────
      # NEON_DATABASE_URL is the single source of truth for the database name
      # and role.  We extract them here so nothing is hardcoded in this file.
      # URL format: postgresql://ROLE:PASSWORD@HOST/DATABASE?sslmode=require
      - name: Resolve Neon database config
        id: db-config
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          # Use Python's standard urlparse for robust URL parsing — handles
          # special characters in passwords and any valid PostgreSQL URL format.
          python3 - <<'PYEOF'
          import os, sys
          from urllib.parse import urlparse

          raw = os.environ.get("NEON_DATABASE_URL", "")
          if not raw:
              print("::error::NEON_DATABASE_URL secret is not set.")
              print("::error::Add it in repository Settings → Secrets and Variables → Actions.")
              sys.exit(1)

          url = urlparse(raw)
          db_name = url.path.lstrip("/").split("?")[0]
          db_role = url.username or ""

          if not db_name or not db_role:
              print("::error::Could not parse database name or role from NEON_DATABASE_URL.")
              print("::error::Expected format: postgresql://ROLE:PASSWORD@HOST/DATABASE?sslmode=require")
              sys.exit(1)

          gho = os.environ.get("GITHUB_OUTPUT", "")
          with open(gho, "a") as f:
              f.write(f"db_name={db_name}\n")
              f.write(f"db_role={db_role}\n")

          print(f"Resolved: database={db_name}, role={db_role}")
          PYEOF

      # ── 3. Create the Neon branch ──────────────────────────────────────────
      # The action creates a new branch off `staging` in the configured Neon
      # project.  The branch is a zero-cost, copy-on-write clone — it shares
      # storage with staging until writes diverge.
      # If the branch already exists (re-run or force-push), the action returns
      # the existing branch ID without error.
      - name: Create Neon database branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ${{ steps.context.outputs.branch_name }}
          # Fork from the staging branch so PR branches have staging-parity
          # schema and data (staging is the parent of all PR branches).
          parent: staging
          api_key: ${{ secrets.NEON_API_KEY }}
          # Database name and role are derived from NEON_DATABASE_URL above.
          username: ${{ steps.db-config.outputs.db_role }}
          database: ${{ steps.db-config.outputs.db_name }}

      # ── 4. Set up pnpm + Node.js for Prisma CLI ─────────────────────────
      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: '24.15'

      # Install only the dependencies needed for Prisma migrations
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Resolve any stuck failed migrations left by a previous CI run ──────
      # Prisma error P3009 occurs when a migration is recorded as "failed" in
      # the _prisma_migrations table, blocking all future deploys on that branch.
      # `prisma migrate status` exits non-zero when migrations are merely *pending*
      # (unapplied) — that is normal on a fresh branch and must NOT trigger a
      # resolve.  We only resolve on an explicit failed-migration signal.
      #
      # Fix strategy: use `prisma migrate resolve --rolled-back <name>` to mark
      # the stuck migration as rolled-back so that `migrate deploy` can re-run it
      # cleanly.  This is the approach recommended by Prisma in its own error
      # output and requires only the database connection URL (no Neon API keys).
      - name: Resolve any stuck failed migrations
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
          DIRECT_DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: |
          set +e
          STATUS=$(npx prisma migrate status 2>&1)
          set -e

          echo "Checking migration status..."
          echo "$STATUS"

          # Detect stuck failed migrations.  Two signals to match:
          #   - "Following migration have failed:" — printed by `prisma migrate status`
          #   - "P3009"                            — printed by `prisma migrate deploy`
          # A non-zero exit alone means *pending* (unapplied) migrations, which is
          # normal on a fresh branch and must NOT trigger the resolve step.
          # The patterns are intentionally narrow to avoid false positives on unrelated
          # log lines (e.g. mentions of "failed" in migration names or tool output).
          if echo "$STATUS" | grep -qE "P3009|Following migration.*have failed"; then
            echo "⚠️  Stuck failed migration(s) detected — resolving via prisma migrate resolve."

            # Extract failed migration name(s).  They appear on the lines
            # immediately after "Following migration have failed:" and follow
            # Prisma's convention of starting with a 14-digit timestamp + '_'.
            FAILED=$(echo "$STATUS" | awk \
              '/Following migration.*failed:/{found=1; next}
               found && /^[[:digit:]].*_/{print $1}')

            if [ -z "$FAILED" ]; then
              echo "::error::Could not parse failed migration name(s) from prisma migrate status output."
              echo "Full output:"
              echo "$STATUS"
              exit 1
            fi

            echo "Failed migration(s) to resolve: $FAILED"

            # Mark each failed migration as rolled-back so migrate deploy can
            # re-apply it from scratch on this branch.
            while IFS= read -r migration; do
              [ -z "$migration" ] && continue
              echo "Marking as rolled-back: $migration"
              npx prisma migrate resolve --rolled-back "$migration"
            done <<< "$FAILED"

            echo "✅ Stuck migration(s) resolved. migrate deploy will re-apply them."
          else
            echo "✅ No failed migrations detected. Proceeding with migration deploy."
          fi

      # ── 6. Run Prisma migrations against the new branch ────────────────────
      # `prisma migrate deploy` applies all pending migrations in order.
      # The DATABASE_URL is overridden to point at the newly created Neon
      # branch so that the PR gets a fully migrated, isolated database.
      #
      # NOTE: Hyperdrive cannot be used here — it is a Cloudflare edge service
      # accessible only from within a Cloudflare Worker.  GitHub Actions runners
      # are standard Linux VMs outside Cloudflare's network.  See file header.
      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
          DIRECT_DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: npx prisma migrate deploy

      # ── 7. Post connection details as a PR comment ─────────────────────────
      # Leaves a collapsible comment with the branch connection string so
      # developers can connect from a local client for debugging.  The
      # comment is updated in-place on subsequent pushes (no spam).
      # Skipped for workflow_dispatch runs that are not tied to a PR (i.e.
      # when branch_name was provided instead of pr_number).
      - name: Comment on PR with branch details
        if: steps.context.outputs.pr_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            const branchName = `${{ steps.context.outputs.branch_name }}`;
            // Validate pr_number is a positive integer — required by the GitHub issues API.
            const rawPrNum   = `${{ steps.context.outputs.pr_number }}`;
            const prNumber   = parseInt(rawPrNum, 10);
            if (isNaN(prNumber) || prNumber <= 0) { core.setFailed(`Invalid pr_number: '${rawPrNum}'. Must be a positive integer.`); return; }
            const dbUrl      = `${{ steps.create-branch.outputs.db_url_with_pooler }}`;
            const projectId  = `${{ secrets.NEON_PROJECT_ID }}`;

            // Marker used to find and update previous comments from this action
            const marker = `<!-- neon-branch-comment -->`;

            const body = [
              marker,
              `## 🐘 Neon Database Branch Created`,
              ``,
              `| Property | Value |`,
              `|----------|-------|`,
              `| **Branch name** | \`${branchName}\` |`,
              `| **Neon project** | \`${projectId}\` |`,
              `| **Migrations** | ✅ Applied successfully |`,
              ``,
              `<details>`,
              `<summary>🔗 Connection string (click to expand)</summary>`,
              ``,
              `\`\`\``,
              `${dbUrl}`,
              `\`\`\``,
              ``,
              `> **Tip:** Use this connection string in your local \`.env\` to test`,
              `> against this PR's isolated database branch.`,
              `</details>`,
              ``,
              `<details>`,
              `<summary>ℹ️ What is this?</summary>`,
              ``,
              `This PR has an isolated Neon database branch that is a copy-on-write`,
              `clone of the \`main\` branch. All Prisma migrations have been applied.`,
              `The branch will be **automatically deleted** when this PR is closed or merged.`,
              ``,
              `See [docs/database-setup/neon-branching.md](../docs/database-setup/neon-branching.md) for details.`,
              `</details>`,
            ].join('\n');

            // Look for an existing comment from this action
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              // Update the previous comment in-place
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              // First run — create a new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
