name: Sentry Source Maps

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  upload-sourcemaps:
    name: Upload Frontend Source Maps to Sentry
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run if SENTRY_ORG is configured — skip silently otherwise
    if: ${{ vars.SENTRY_ORG != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular frontend (with source maps)
        run: pnpm --filter adblock-compiler-frontend run build -- --source-map=true
        env:
          NODE_ENV: production

      - name: Upload source maps to Sentry
        working-directory: frontend
        run: |
          npx @sentry/cli sourcemaps upload \
            --org "${{ vars.SENTRY_ORG }}" \
            --project "${{ vars.SENTRY_PROJECT }}" \
            --release "${{ github.sha }}" \
            --url-prefix "~/" \
            ./dist
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  upload-worker:
    name: Upload Worker Source Maps to Sentry
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run if SENTRY_PROJECT_WORKER is configured
    if: ${{ vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT_WORKER != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build Worker bundle (dry-run for source maps)
        run: deno run -A npm:wrangler deploy --dry-run --outdir dist/worker

      - name: Upload Worker source maps to Sentry
        run: |
          npx @sentry/cli sourcemaps upload \
            --org "${{ vars.SENTRY_ORG }}" \
            --project "${{ vars.SENTRY_PROJECT_WORKER }}" \
            --release "${{ github.sha }}" \
            ./dist/worker
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  upload-frontend-ssr:
    name: Upload Frontend SSR Source Maps to Sentry
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    # Only run if SENTRY_ORG is configured
    if: ${{ vars.SENTRY_ORG != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --filter adblock-compiler-frontend

      - name: Build Angular frontend SSR bundle (with source maps)
        run: pnpm --filter adblock-compiler-frontend run build -- --source-map=true
        env:
          NODE_ENV: production
          CF_WEB_ANALYTICS_TOKEN: ''

      - name: Upload frontend SSR source maps to Sentry
        working-directory: frontend
        run: |
          npx @sentry/cli sourcemaps upload \
            --org "${{ vars.SENTRY_ORG }}" \
            --project "${{ vars.SENTRY_FRONTEND_PROJECT != '' && vars.SENTRY_FRONTEND_PROJECT || vars.SENTRY_PROJECT }}" \
            --release "${{ github.sha }}" \
            ./dist/adblock-compiler/server
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
