name: Build & Deploy Starlight Docs

on:
    push:
        branches: [main]
        paths:
            - 'docs/**'
            - 'docs-starlight/**'
            - 'pnpm-lock.yaml'
            - 'package.json'
            - '.github/workflows/docs-starlight.yml'
    workflow_dispatch:

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@a7487ba4d186f8b6563cdf85d29c5b1b7bb7ece8 # v4.1.0
              with:
                  version: '10.31.0'

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: '22'

            - name: Install dependencies
              working-directory: docs-starlight
              run: pnpm install

            - name: Build Starlight site
              working-directory: docs-starlight
              run: pnpm run build

            - name: Deploy to Cloudflare Worker
              working-directory: docs-starlight
              run: npx wrangler@4 deploy --config wrangler.docs-starlight.toml
