$kind: http-request
description: >
  Resolves and merges multiple configuration layers into a single effective
  configuration. Useful for composing configurations from multiple sources.
url: {{baseUrl}}/configuration/resolve
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "layers": [
        {
          "name": "base",
          "sources": []
        }
      ]
    }
examples: ./.resources/Resolve configuration layers.resources/examples
order: 3000
