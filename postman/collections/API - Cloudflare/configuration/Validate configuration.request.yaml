$kind: http-request
description: >
  Validates a configuration object against the compiler schema. Returns
  validation errors if the configuration is invalid.
url: {{baseUrl}}/configuration/validate
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "name": "My Filter List",
      "sources": [
        {
          "source": "https://example.com/filters.txt",
          "transformations": ["RemoveComments", "Validate"]
        }
      ],
      "transformations": ["Deduplicate"]
    }
examples: ./.resources/Validate configuration.resources/examples
order: 2000
