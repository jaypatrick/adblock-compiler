$kind: http-request
description: Saves a compiler configuration for reuse.
url: {{baseUrl}}/configuration/saved
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "configuration": {
        "name": "My Saved Configuration",
        "sources": [
          {
            "source": "https://example.com/filters.txt",
            "transformations": ["RemoveComments"]
          }
        ],
        "transformations": ["Deduplicate"]
      }
    }
order: 7000
