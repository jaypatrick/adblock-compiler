$kind: http-request
description: >
  Downloads a stored configuration by ID. Returns the configuration as JSON.
url: {{baseUrl}}/configuration/download/:id
method: GET
headers:
  Accept: application/json
  X-API-Key: "{{apiKey}}"
pathVariables:
  - key: id
    value: string
    description: Configuration ID returned from the create endpoint
body:
  type: text
  content: ""
examples: ./.resources/Download configuration.resources/examples
order: 5000
