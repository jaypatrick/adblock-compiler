$kind: http-request
description: >
  Updates an existing API key's name, scopes, or rate limit.
url: {{baseUrl}}/keys/:id
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
  X-API-Key: "{{apiKey}}"
pathVariables:
  - key: id
    value: string
    description: API key ID to update
body:
  type: json
  content: |-
    {
      "name": "Updated Key Name",
      "scopes": ["compile"],
      "rateLimitPerMinute": 120
    }
examples: ./.resources/Update API key.resources/examples
order: 4000
