$kind: http-request
description: >
  Receives and processes Stripe subscription and PAYG payment webhook events.
  This endpoint is called directly by Stripe — do not call it manually.
  Stripe signs requests with STRIPE_WEBHOOK_SECRET.
url: {{baseUrl}}/stripe/webhook
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  Stripe-Signature: "{{stripeSignature}}"
body:
  type: json
  content: |-
    {
      "type": "checkout.session.completed",
      "data": {
        "object": {}
      }
    }
examples: ./.resources/Stripe webhook.resources/examples
order: 1000
