$kind: http-request
description: Creates a Stripe Checkout session for a pay-as-you-go payment.
url: {{baseUrl}}/stripe/payg/checkout
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  Authorization: Bearer {{apiKey}}
body:
  type: json
  content: |-
    {
      "requestsToPurchase": 10,
      "successUrl": "https://app.bloqr.dev/success",
      "cancelUrl": "https://app.bloqr.dev/cancel"
    }
order: 2000
