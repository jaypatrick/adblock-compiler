$kind: http-request
description: >
  Create a Pay-As-You-Go session token that grants a fixed number of API calls.
  Requires authentication. Returns a session token to be passed as X-Payg-Session
  header in subsequent requests.
url: {{baseUrl}}/payg/session/create
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "stripeCustomerId": "cus_example123"
    }
examples: ./.resources/Create PAYG session.resources/examples
order: 1000
