$kind: http-request
description: >
  Returns the current status of a PAYG session. Requires the X-Payg-Session header
  containing the session token returned from the create endpoint.
url: {{baseUrl}}/payg/session/status
method: GET
headers:
  Accept: application/json
  X-API-Key: "{{apiKey}}"
  X-Payg-Session: "{{paygSessionToken}}"
body:
  type: text
  content: ""
examples: ./.resources/Get PAYG session status.resources/examples
order: 2000
