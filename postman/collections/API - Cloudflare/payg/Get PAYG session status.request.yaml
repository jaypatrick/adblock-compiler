$kind: http-request
description: >
  Returns the status of the current PAYG session — requests granted, used,
  remaining, and expiry. Requires a valid X-Payg-Session token.
  Use the paygSessionToken environment variable.
url: {{baseUrl}}/api/payg/session/status
method: GET
headers:
  Accept: application/json
  X-Payg-Session: "{{paygSessionToken}}"
body:
  type: text
  content: ""
examples: ./.resources/Get PAYG session status.resources/examples
order: 1020
