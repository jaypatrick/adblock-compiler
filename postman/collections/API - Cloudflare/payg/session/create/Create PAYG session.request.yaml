$kind: http-request
description: Creates a pay-as-you-go billing session.
url: {{baseUrl}}/api/payg/session/create
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "requestsToPurchase": 1000
    }
order: 1000
