$kind: http-request
description: >
  Returns cumulative PAYG usage for the authenticated customer. Requires
  authentication. Returns zeroed summary when no PAYG customer record exists yet.
url: {{baseUrl}}/payg/usage
method: GET
headers:
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: text
  content: ""
examples: ./.resources/Get PAYG usage.resources/examples
order: 3000
