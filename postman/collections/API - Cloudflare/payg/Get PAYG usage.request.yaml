$kind: http-request
description: >
  Returns cumulative PAYG usage summary for the authenticated user — total requests,
  total spend, this-month breakdown, and subscription conversion eligibility.
  Requires API key authentication.
url: {{baseUrl}}/api/payg/usage
method: GET
headers:
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: text
  content: ""
examples: ./.resources/Get PAYG usage.resources/examples
order: 1010
