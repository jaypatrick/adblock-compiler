$kind: http-request
description: >
  Creates a new API key for the authenticated user. Requires an active user
  session (Bearer token from sign-in). The raw key is returned once and cannot
  be retrieved again.
url: {{baseUrl}}/keys
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  Authorization: Bearer {{bearerToken}}
body:
  type: json
  content: |-
    {
      "name": "My API Key",
      "expiresAt": null
    }
order: 1000
