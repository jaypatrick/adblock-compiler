$kind: http-request
description: >
  Executes a raw SQL query on the Neon database. Use with caution — only SELECT
  queries are permitted via this endpoint. Requires admin authentication.
url: {{baseUrl}}/admin/neon/query
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  X-Admin-Key: "{{adminKey}}"
body:
  type: json
  content: |-
    {
      "query": "SELECT id, email, created_at FROM users ORDER BY created_at DESC LIMIT 10",
      "branchId": ""
    }
examples: ./.resources/Execute Neon query.resources/examples
order: 1000
