$kind: http-request
description: >
  Returns details for a specific Neon branch by ID. Requires admin authentication.
url: {{baseUrl}}/api/admin/neon/branches/:branchId
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{adminKey}}
pathVariables:
  - key: branchId
    value: br_string
    description: Neon branch ID (e.g. br_morning_forest_123456)
body:
  type: text
  content: ""
examples: ./.resources/Get Neon branch.resources/examples
order: 4000
