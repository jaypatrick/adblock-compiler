$kind: http-request
description: >
  Lists all databases within a specific Neon branch. Requires admin authentication.
url: {{baseUrl}}/admin/neon/databases/:branchId
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{adminKey}}
pathVariables:
  - key: branchId
    value: br_string
    description: Neon branch ID (e.g. br_morning_forest_123456)
body:
  type: text
  content: ""
examples: ./.resources/List databases for branch.resources/examples
order: 1000
