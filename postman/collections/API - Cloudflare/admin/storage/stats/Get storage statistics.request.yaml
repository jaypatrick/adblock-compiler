$kind: http-request
description: Returns database table counts and expired entry counts
url: {{baseUrl}}/admin/storage/stats
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{adminKey}}"
    in: header
examples: ./.resources/Get storage statistics.resources/examples
tests:
  - name: "CF Access blocks without service token (known limitation)"
    script: "pm.expect(pm.response.code).to.be.oneOf([401, 403]);"
order: 1000
