$kind: http-request
description: Runs VACUUM on the D1 database to reclaim space
url: {{baseUrl}}/admin/storage/vacuum
method: POST
headers:
  Accept: application/json
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{adminKey}}"
    in: header
examples: ./.resources/Vacuum database.resources/examples
tests:
  - name: "CF Access blocks without service token (known limitation)"
    script: "pm.expect(pm.response.code).to.be.oneOf([401, 403]);"
order: 1000
