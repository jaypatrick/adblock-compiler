$kind: http-request
description: Executes a SELECT-only SQL query against the D1 database for debugging
url: {{baseUrl}}/admin/storage/query
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "sql": "string"
    }
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Execute read-only SQL query.resources/examples
tests:
  - name: "CF Access blocks without service token (known limitation)"
    script: "pm.expect(pm.response.code).to.be.oneOf([401, 403]);"
order: 1000
