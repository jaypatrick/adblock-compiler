$kind: http-request
description: Returns all tables and indexes in the D1 database
url: {{baseUrl}}/admin/storage/tables
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/List database tables.resources/examples
tests:
  - name: "CF Access blocks without service token (known limitation)"
    script: "pm.expect(pm.response.code).to.be.oneOf([401, 403]);"
order: 1000
