$kind: http-request
description: Deletes all cache entries from storage tables
url: {{baseUrl}}/admin/storage/clear-cache
method: POST
headers:
  Accept: application/json
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{adminKey}}"
    in: header
examples: ./.resources/Clear cache entries.resources/examples
tests:
  - name: "CF Access blocks without service token (known limitation)"
    script: "pm.expect(pm.response.code).to.be.oneOf([401, 403]);"
order: 1000
