$kind: http-request
description: >
  Returns a security posture summary including CSP violation counts, failed auth
  attempts, active bans, and recent anomaly detections. Requires admin authentication.
url: {{baseUrl}}/admin/security/overview
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{adminKey}}
body:
  type: text
  content: ""
examples: ./.resources/Security overview.resources/examples
order: 1000
