$kind: http-request
description: >
  Permanently deletes a user and all associated data. This action is irreversible.
  Requires admin authentication.
url: {{baseUrl}}/admin/users/:id
method: DELETE
headers:
  Accept: application/json
  X-Admin-Key: "{{adminKey}}"
pathVariables:
  - key: id
    value: string
    description: User ID (UUID)
body:
  type: text
  content: ""
examples: ./.resources/Delete user.resources/examples
order: 4000
