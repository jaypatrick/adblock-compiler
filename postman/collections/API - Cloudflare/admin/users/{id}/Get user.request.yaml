$kind: http-request
description: >
  Returns full details for a single user by ID. Requires admin authentication.
url: {{baseUrl}}/api/admin/users/:id
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{adminKey}}
pathVariables:
  - key: id
    value: string
    description: User ID (UUID)
body:
  type: text
  content: ""
examples: ./.resources/Get user.resources/examples
order: 2000
