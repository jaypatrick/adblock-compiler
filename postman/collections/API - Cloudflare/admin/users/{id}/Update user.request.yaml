$kind: http-request
description: >
  Updates a user's profile fields (name, email, etc.). Requires admin authentication.
url: {{baseUrl}}/admin/users/:id
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
  X-Admin-Key: "{{adminKey}}"
pathVariables:
  - key: id
    value: string
    description: User ID (UUID)
body:
  type: json
  content: |-
    {
      "name": "Updated Name",
      "email": "user@example.com"
    }
examples: ./.resources/Update user.resources/examples
order: 3000
