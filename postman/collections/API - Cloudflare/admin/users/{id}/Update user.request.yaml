$kind: http-request
description: >
  Updates a user's tier and/or role. Requires admin authentication.
url: {{baseUrl}}/admin/users/:id
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
  Authorization: Bearer {{adminKey}}
pathVariables:
  - key: id
    value: string
    description: User ID (UUID)
body:
  type: json
  content: |-
    {
      "tier": "pro",
      "role": "user"
    }
examples: ./.resources/Update user.resources/examples
order: 3000
