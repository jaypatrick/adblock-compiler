$kind: http-request
description: >
  Returns full details of a specific agent session including tool invocations,
  messages, and timing. Requires admin authentication.
url: {{baseUrl}}/admin/agents/sessions/:sessionId
method: GET
headers:
  Accept: application/json
  X-Admin-Key: "{{adminKey}}"
pathVariables:
  - key: sessionId
    value: string
    description: Agent session ID (UUID)
body:
  type: text
  content: ""
examples: ./.resources/Get agent session.resources/examples
order: 2000
