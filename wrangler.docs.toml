# wrangler.docs.toml — Documentation Worker (Cloudflare)
# Serves mdBook static output (./book/) as a Cloudflare Worker with static assets.

name = "bloqr-docs"
compatibility_date = "2026-01-01"
workers_dev = true

[[routes]]
pattern = "docs.bloqr.dev"
custom_domain = true

[assets]
directory = "./book"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
[vars]
ENVIRONMENT = "production"
URL_DOCS = "https://docs.bloqr.dev"
